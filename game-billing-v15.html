<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#080b14"/>
<title>🎮 Game Billing Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Orbitron:wght@500;700;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;
  background-image:
    radial-gradient(ellipse 120% 70% at -5% 0%,rgba(14,30,80,.9),transparent 55%),
    radial-gradient(ellipse 100% 60% at 105% 100%,rgba(60,20,100,.6),transparent 55%),
    radial-gradient(ellipse 60% 40% at 50% 50%,rgba(4,12,40,.8),transparent);
  overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
/* ambient glow spots */
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(circle 800px at 10% 15%,rgba(56,189,248,.05),transparent),
    radial-gradient(circle 600px at 90% 85%,rgba(167,139,250,.06),transparent),
    radial-gradient(circle 400px at 50% 50%,rgba(52,211,153,.025),transparent);}
#main-app,main{position:relative;z-index:1;}
:root{
  --bg:#02050e;--bg2:#060d1c;--bg3:#0a1226;--bg4:#0e1730;--bg5:#121d38;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--border3:rgba(255,255,255,.2);
  --text:#f0f4ff;--text2:#a8b8d4;--muted:#5a7a9a;--muted2:#2a3a55;
  --blue:#38bdf8;--blue2:#0ea5e9;--blue3:#0284c7;
  --purple:#a78bfa;--purple2:#8b5cf6;--purple3:#7c3aed;
  --green:#34d399;--green2:#10b981;--green3:#059669;
  --yellow:#fbbf24;--yellow2:#f59e0b;
  --red:#f87171;--red2:#ef4444;--red3:#dc2626;
  --pink:#f472b6;--pink2:#ec4899;
  --orange:#fb923c;--orange2:#f97316;
  --teal:#2dd4bf;--cyan:#22d3ee;--indigo:#818cf8;
  --glow-blue:0 0 30px rgba(56,189,248,.3);
  --glow-green:0 0 30px rgba(52,211,153,.3);
  --glow-yellow:0 0 30px rgba(251,191,36,.3);
  --glow-red:0 0 30px rgba(248,113,113,.3);
  --glow-purple:0 0 30px rgba(167,139,250,.3);
  --glass:rgba(255,255,255,.04);--glass2:rgba(255,255,255,.07);
  --radius:18px;--radius-sm:12px;
  --shadow:0 8px 40px rgba(0,0,0,.55);
  --ease:cubic-bezier(.4,0,.2,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
  --bounce:cubic-bezier(.68,-0.55,.27,1.55);
}

/* ═══ ANIMATIONS ═══ */
@keyframes lockFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes gradMove{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes glowPulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.9;transform:scale(1.05)}}
@keyframes scanH{0%{transform:translateY(-100%)}100%{transform:translateY(400%)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInScale{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes popIn{0%{transform:scale(.6);opacity:0}65%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes borderGlow{0%,100%{box-shadow:0 0 8px rgba(0,200,248,.15)}50%{box-shadow:0 0 22px rgba(0,200,248,.45)}}
@keyframes scanLine{0%{top:0}100%{top:100%}}
@keyframes confettiDrop{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(-150px) rotate(760deg) scale(0);opacity:0}}
@keyframes navPop{0%{transform:scale(1)}50%{transform:translateY(-4px) scale(1.18)}100%{transform:translateY(-2px) scale(1)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes timerTick{0%,100%{opacity:1}50%{opacity:.78}}
@keyframes liveRing{0%{box-shadow:0 0 0 0 rgba(0,200,248,.4)}70%{box-shadow:0 0 0 9px rgba(0,200,248,0)}100%{box-shadow:0 0 0 0 rgba(0,200,248,0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-18px) scale(.88)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) scale(.85)}}
@keyframes countSpin{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes goalDone{0%,100%{transform:scale(1)}30%{transform:scale(1.05)}60%{transform:scale(.97)}}
@keyframes pinFill{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes progressIn{from{width:0}to{width:var(--w,0)}}

/* ═══ LOCK SCREEN — Premium ═══ */
#lock-screen{
  position:fixed;inset:0;z-index:9999;display:none;flex-direction:column;
  align-items:center;justify-content:center;padding:32px 24px;
  background:radial-gradient(ellipse 140% 100% at 50% 0%,#050d28,#02050e 60%);
  overflow:hidden;
}
/* Animated orbs */
#lock-screen::before{
  content:'';position:absolute;width:500px;height:500px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(56,189,248,.12),transparent 70%);
  top:-150px;left:50%;transform:translateX(-50%);
  animation:orbFloat 6s ease-in-out infinite;
  pointer-events:none;
}
#lock-screen::after{
  content:'';position:absolute;width:300px;height:300px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(167,139,250,.1),transparent 70%);
  bottom:-80px;right:-60px;
  animation:orbFloat 8s ease-in-out infinite reverse;
  pointer-events:none;
}
@keyframes orbFloat{0%,100%{transform:translateX(-50%) translateY(0) scale(1)}50%{transform:translateX(-50%) translateY(-30px) scale(1.08)}}
/* Lock content */
.lock-badge{
  width:90px;height:90px;border-radius:28px;
  background:linear-gradient(145deg,rgba(56,189,248,.15),rgba(167,139,250,.1));
  border:1px solid rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  font-size:44px;margin-bottom:20px;
  box-shadow:0 0 0 1px rgba(255,255,255,.06) inset,
             0 20px 60px rgba(0,0,0,.5),
             0 0 40px rgba(56,189,248,.15);
  animation:lockFloat 4s ease-in-out infinite;
  position:relative;z-index:1;
}
.lock-title{
  font-family:'Orbitron';font-size:17px;font-weight:900;
  background:linear-gradient(90deg,#fff,rgba(255,255,255,.7));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:3px;margin-bottom:5px;position:relative;z-index:1;
}
.lock-shop{font-size:11px;color:var(--blue);letter-spacing:1px;margin-bottom:6px;position:relative;z-index:1;}
.lock-sub{font-size:12px;color:var(--muted);margin-bottom:24px;text-align:center;position:relative;z-index:1;}
/* PIN dots */
.pin-dots{display:flex;gap:14px;margin-bottom:28px;direction:ltr;position:relative;z-index:1;}
.pin-dot{
  width:14px;height:14px;border-radius:50%;
  background:transparent;
  border:2px solid rgba(255,255,255,.2);
  transition:all .2s var(--spring);
}
.pin-dot.filled{
  background:var(--blue);border-color:var(--blue);
  box-shadow:0 0 14px rgba(56,189,248,.7),0 0 4px rgba(56,189,248,1);
  transform:scale(1.15);
  animation:dotPop .2s var(--bounce);
}
.pin-dot.error{background:var(--red);border-color:var(--red);box-shadow:0 0 14px rgba(248,113,113,.7);}
@keyframes dotPop{0%{transform:scale(0)}70%{transform:scale(1.3)}100%{transform:scale(1.15)}}

/* ═══ CUSTOMER PORTAL MODE ═══ */
body.customer-mode{overflow:hidden;}
#customer-portal{position:fixed;inset:0;z-index:10000;display:none;flex-direction:column;
  background:radial-gradient(ellipse 120% 80% at 50% 20%,#050d28,#02050e 65%);}
#customer-portal.open{display:flex;}
.portal-header{padding:18px 20px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.portal-body{flex:1;overflow-y:auto;padding:16px 20px 24px;-webkit-overflow-scrolling:touch}
.portal-card{background:linear-gradient(145deg,rgba(6,13,28,.95),rgba(10,18,38,.9));
  border:1px solid var(--border);border-radius:20px;padding:18px;margin-bottom:12px;
  box-shadow:0 1px 0 rgba(255,255,255,.06) inset}
.portal-stat{text-align:center;flex:1;padding:12px 8px;background:rgba(255,255,255,.04);
  border:1px solid var(--border);border-radius:14px}
.portal-stat-val{font-family:'Orbitron';font-size:20px;font-weight:900;line-height:1.1}
.portal-stat-lbl{font-size:9px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.4px}
.portal-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;
  font-size:11px;font-weight:700;border:1px solid}
.portal-action{width:100%;padding:14px;border-radius:16px;border:none;font-family:'Cairo';
  font-size:14px;font-weight:900;cursor:pointer;transition:.15s;margin-bottom:8px;
  display:flex;align-items:center;justify-content:center;gap:10px}
.portal-action:active{transform:scale(.97)}
/* Customer Card */
.cust-card-bg{
  border-radius:24px;padding:22px;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#0a1a3a,#150828);
  border:1px solid rgba(255,255,255,.15);
  box-shadow:0 20px 60px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.12) inset;
}
.cust-card-bg::before{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 80% 20%,rgba(56,189,248,.12),transparent 60%),
             radial-gradient(circle at 20% 80%,rgba(167,139,250,.1),transparent 60%);}
/* QR display */
.qr-container{background:#fff;border-radius:16px;padding:14px;display:inline-block;
  box-shadow:0 8px 32px rgba(0,0,0,.4)}
@keyframes cardReveal{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes costUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(52,211,153,.35)}70%{box-shadow:0 0 0 10px rgba(52,211,153,0)}}
@keyframes headerGlow{0%,100%{text-shadow:0 0 12px rgba(56,189,248,.4)}50%{text-shadow:0 0 24px rgba(56,189,248,.8)}}
@keyframes statPop{0%{transform:scale(1)}40%{transform:scale(1.18) translateY(-3px)}100%{transform:scale(1)}}
@keyframes idleFloat{0%,100%{transform:translateY(0px)}50%{transform:translateY(-3px)}}
/* PIN pad */
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:248px;direction:ltr;position:relative;z-index:1;}
.pin-btn{
  padding:0;height:68px;border-radius:18px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.05);
  color:#fff;font-family:'Cairo';font-size:22px;font-weight:700;
  cursor:pointer;transition:all .12s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  position:relative;overflow:hidden;
  backdrop-filter:blur(8px);
}
.pin-btn::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 0%,rgba(255,255,255,.1),transparent 70%);
  border-radius:inherit;
}
.pin-btn .pin-sub{font-size:7px;color:rgba(255,255,255,.3);letter-spacing:1px;font-family:'Orbitron';line-height:1;}
.pin-btn:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.15);}
.pin-btn:active{background:rgba(56,189,248,.2);border-color:rgba(56,189,248,.5);transform:scale(.9);box-shadow:0 0 20px rgba(56,189,248,.3);}
.pin-btn.action{background:rgba(56,189,248,.08);border-color:rgba(56,189,248,.2);font-size:20px;}
/* Error & attempts */
.pin-err{color:var(--red);font-size:11px;margin-top:14px;min-height:18px;text-align:center;font-weight:700;position:relative;z-index:1;}
.pin-err.shake{animation:shake .4s ease}
.pin-attempts{display:flex;gap:5px;margin-top:10px;position:relative;z-index:1;}
.attempt-dot{width:8px;height:8px;border-radius:50%;background:rgba(248,113,113,.3);border:1px solid rgba(248,113,113,.4);transition:.2s;}
.attempt-dot.used{background:var(--red);box-shadow:0 0 8px rgba(248,113,113,.6);}
/* Lock bottom */
.lock-footer{display:flex;gap:16px;margin-top:22px;position:relative;z-index:1;}
.lock-footer-btn{background:none;border:none;font-size:11px;color:rgba(255,255,255,.35);cursor:pointer;font-family:'Cairo';padding:4px 8px;border-radius:8px;transition:.15s;}
.lock-footer-btn:hover{color:rgba(255,255,255,.7);background:rgba(255,255,255,.06);}
/* Lockout overlay */
.lock-cooldown{position:absolute;inset:0;background:rgba(0,0,0,.7);z-index:2;display:none;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
.lock-cooldown-timer{font-family:'Orbitron';font-size:48px;font-weight:900;color:var(--red);text-shadow:0 0 30px rgba(248,113,113,.5);}
.lock-cooldown-msg{font-size:13px;color:var(--muted);margin-top:10px;}

/* ═══ HEADER ═══ */
.header{background:rgba(2,5,14,.85);border-bottom:1px solid rgba(255,255,255,.08);padding:11px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(28px) saturate(200%);-webkit-backdrop-filter:blur(28px) saturate(200%);box-shadow:0 1px 0 rgba(255,255,255,.07),0 12px 40px rgba(0,0,0,.4);}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,var(--blue2),var(--purple2));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 0 1px rgba(255,255,255,.12) inset,var(--glow-blue)}
.logo-title{font-family:'Orbitron';font-weight:900;font-size:11.5px;background:linear-gradient(90deg,#fff,rgba(255,255,255,.75));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;line-height:1.3}
.logo-sub{font-size:8.5px;color:var(--muted);letter-spacing:.4px}
.hstats{display:flex;gap:5px;align-items:center}
.hstat{text-align:center;cursor:pointer;padding:4px 6px;border-radius:10px;transition:.15s;background:rgba(255,255,255,.04);border:1px solid transparent;min-width:44px}
.hstat:hover{background:rgba(255,255,255,.07);border-color:var(--border)}
.hstat:active{transform:scale(.93)}
.hstat:active{background:rgba(255,255,255,.07)}
.hstat-lbl{font-size:8px;color:var(--muted)}.hstat-val{font-family:'Orbitron';font-size:12px;font-weight:700}
.hstat-val.pop{animation:countSpin .28s ease}
.header-emp{font-size:10px;color:var(--yellow);font-weight:700;background:rgba(255,184,0,.1);border:1px solid rgba(255,184,0,.28);border-radius:9px;padding:4px 9px;cursor:pointer;transition:.15s;white-space:nowrap}
.header-emp:active{opacity:.8;transform:scale(.95)}

/* ═══ NAV — dir:ltr on container fixes RTL reversal ═══ */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(2,5,14,.9);border-top:1px solid rgba(255,255,255,.07);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom,0);backdrop-filter:blur(28px) saturate(200%);-webkit-backdrop-filter:blur(28px) saturate(200%);box-shadow:0 -1px 0 rgba(255,255,255,.05);}
.nav-btn{flex:1;padding:10px 2px 9px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;transition:.2s}
.nav-btn::before{content:'';position:absolute;top:0;left:18%;right:18%;height:2.5px;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:0 0 6px 6px;opacity:0;transition:.25s var(--spring);transform:scaleX(.5)}
.nav-btn.active::before{opacity:1;transform:scaleX(1)}
.nav-btn::after{content:'';position:absolute;top:6px;left:20%;right:20%;bottom:6px;border-radius:12px;background:rgba(56,189,248,.08);opacity:0;transition:.2s;transform:scale(.8)}
.nav-btn.active::after{opacity:1;transform:scale(1)}
.nav-btn .ni{font-size:21px;transition:.2s;line-height:1;position:relative;z-index:1}
.nav-btn .nl{font-size:7.5px;font-weight:700;color:var(--muted);font-family:'Cairo';transition:.2s;position:relative;z-index:1;letter-spacing:.2px}
.nav-btn.active .nl{color:var(--blue)}
.nav-btn.active .ni{filter:drop-shadow(0 0 8px rgba(56,189,248,.9));transform:translateY(-2px) scale(1.08);animation:navPop .32s var(--spring)}
.nav-btn:active .ni{transform:scale(.82)}

/* ═══ PAGES ═══ */
.page{padding:12px 12px 90px;display:none}.page.active{display:block}

/* ═══ CARDS ═══ */
.card{background:linear-gradient(145deg,rgba(6,13,28,.92),rgba(10,18,38,.92));border:1px solid var(--border);border-radius:var(--radius);padding:15px;margin-bottom:13px;position:relative;overflow:hidden;transition:box-shadow .25s,border-color .25s;box-shadow:0 1px 0 rgba(255,255,255,.05) inset}
.card:hover{border-color:var(--border2);box-shadow:0 1px 0 rgba(255,255,255,.07) inset,0 6px 24px rgba(0,0,0,.35)}
.card.live{box-shadow:0 0 0 1px rgba(52,211,153,.25),0 6px 30px rgba(52,211,153,.1);animation:liveRing 3s ease infinite}
.live-bar{position:absolute;top:0;left:0;right:0;height:2.5px;background:linear-gradient(90deg,transparent 0%,var(--dc,var(--green)) 40%,rgba(255,255,255,.6) 50%,var(--dc,var(--green)) 60%,transparent 100%);animation:shimmer 2s linear infinite;background-size:200% 100%}

/* ═══ DEVICE ═══ */
.dev-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.dev-info{display:flex;align-items:center;gap:11px}
.dev-img{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;position:relative;overflow:hidden;transition:.2s}
.dev-img img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.dev-name{font-weight:900;font-size:14px;color:#fff;letter-spacing:.2px}.dev-rate{font-size:10px;margin-top:2px;font-weight:700;letter-spacing:.2px}
.badge{border-radius:8px;padding:3px 9px;font-size:9px;font-weight:700}
.badge-live{background:rgba(0,200,248,.08);border:1px solid rgba(0,200,248,.35);color:var(--blue);animation:pulse 2s ease infinite}
.badge-paused{background:rgba(255,184,0,.08);border:1px solid rgba(255,184,0,.35);color:var(--yellow)}

/* ═══ SESSION TIMER ═══ */
.s-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.chip{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:4px 11px;font-size:10px;color:var(--text2);white-space:nowrap;backdrop-filter:blur(6px)}
.timer-wrap{text-align:center;margin:14px 0;padding:14px;background:rgba(0,0,0,.22);border:1px solid var(--border);border-radius:16px}
.timer{font-family:'Orbitron';font-size:36px;font-weight:900;letter-spacing:6px;animation:timerTick 1s step-end infinite;direction:ltr;display:block;text-shadow:0 0 28px currentColor;line-height:1.15}
.timer-cost{font-size:14px;color:var(--green);margin-top:7px;font-weight:700;direction:ltr;display:block;text-shadow:0 0 14px rgba(52,211,153,.5)}
.prog-wrap{margin-bottom:10px}
.prog-info{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:5px}
.prog-bar{height:6px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .6s var(--ease);position:relative}

/* ═══ QUEUE ═══ */
.queue-item{background:rgba(255,184,0,.07);border:1px solid rgba(255,184,0,.25);border-radius:12px;padding:10px 13px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.queue-pos{font-family:'Orbitron';font-size:18px;font-weight:900;color:var(--yellow);width:24px;direction:ltr}

/* ═══ BUTTONS ═══ */
.btn-row{display:flex;gap:7px}
.btn{flex:1;padding:12px 8px;border-radius:13px;border:none;font-family:'Cairo';font-weight:700;font-size:12px;cursor:pointer;transition:all .15s var(--ease);position:relative;overflow:hidden;letter-spacing:.2px}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .12s}
.btn:hover::after{background:rgba(255,255,255,.06)}
.btn:active{transform:scale(.93)!important}
.btn-sm{flex:0;padding:10px 13px}
.btn-blue{background:linear-gradient(135deg,var(--blue),var(--blue3));color:#000;font-weight:900;box-shadow:0 3px 16px rgba(56,189,248,.35),0 1px 0 rgba(255,255,255,.2) inset}
.btn-red{background:linear-gradient(135deg,var(--red),var(--red3));color:#fff;box-shadow:0 3px 16px rgba(248,113,113,.3),0 1px 0 rgba(255,255,255,.1) inset}
.btn-green{background:linear-gradient(135deg,var(--green),var(--green3));color:#000;font-weight:900;box-shadow:0 3px 16px rgba(52,211,153,.35),0 1px 0 rgba(255,255,255,.2) inset}
.btn-yellow{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:var(--yellow)}
.btn-purple{background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.3);color:var(--purple)}
.btn-pink{background:rgba(244,114,182,.08);border:1px solid rgba(244,114,182,.25);color:var(--pink)}
.btn-orange{background:rgba(251,146,60,.1);border:1px solid rgba(251,146,60,.25);color:var(--orange)}
.btn-ghost{background:var(--glass);border:1px solid var(--border2);color:var(--text2)}
.btn-ghost:hover{background:var(--glass2);border-color:var(--border3)}
.btn-start{width:100%;padding:16px;border-radius:15px;border:none;color:#000;font-family:'Cairo';font-weight:900;font-size:15px;cursor:pointer;margin-top:10px;transition:.15s;letter-spacing:.6px;position:relative;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.4),0 1px 0 rgba(255,255,255,.25) inset}
.btn-start:hover{filter:brightness(1.08)}
.btn-start:active{transform:scale(.97)!important}

/* ═══ FORMS ═══ */
select,input,textarea{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Cairo';font-size:13px;padding:11px 13px;width:100%;outline:none;-webkit-appearance:none;transition:border-color .2s,box-shadow .2s,background .15s}
select:hover,input:hover,textarea:hover{background:rgba(255,255,255,.06);border-color:var(--border2)}
select:focus,input:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(56,189,248,.14);background:rgba(255,255,255,.05)}
select option{background:var(--bg3)}
.form-group{margin-bottom:13px}
.form-label{font-size:9.5px;color:var(--text2);margin-bottom:5px;display:block;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
input::placeholder,textarea::placeholder{color:var(--muted)}

/* ═══ SECTION HEAD ═══ */
.sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sec-title{font-size:14px;font-weight:900;color:#fff}
.add-btn{padding:8px 18px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--blue2),var(--purple2));color:#fff;font-family:'Cairo';font-weight:900;font-size:11px;cursor:pointer;transition:.15s;box-shadow:0 2px 16px rgba(56,189,248,.3),0 1px 0 rgba(255,255,255,.15) inset;letter-spacing:.3px}
.add-btn:active{transform:scale(.92)}
.add-btn:hover{filter:brightness(1.1);box-shadow:0 4px 20px rgba(56,189,248,.4)}

/* ═══ HISTORY ═══ */
.hist-item{background:linear-gradient(145deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:13px;padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.hist-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.hist-info{flex:1;min-width:0}.hist-dev{font-weight:700;font-size:11px;color:#fff}.hist-sub{font-size:9px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-right{text-align:center;flex-shrink:0;direction:ltr}.hist-cost{font-family:'Orbitron';font-size:12px;color:var(--green);font-weight:700}.hist-dur{font-size:9px;color:var(--muted)}

/* ═══ STATS ═══ */
.stat-row{display:flex;gap:9px;margin-bottom:12px}
.stat-card{background:linear-gradient(145deg,rgba(6,13,28,.95),rgba(10,18,38,.9));border:1px solid var(--border);border-radius:16px;padding:14px;text-align:center;flex:1;transition:.2s;box-shadow:0 1px 0 rgba(255,255,255,.05) inset}
.stat-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 1px 0 rgba(255,255,255,.07) inset,0 8px 24px rgba(0,0,0,.3)}
.stat-lbl{font-size:8.5px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.stat-val{font-family:'Orbitron';font-size:19px;font-weight:900;line-height:1.1}
.stat-sub{font-size:8.5px;color:var(--muted);margin-top:3px}
.dbar-wrap{margin-bottom:10px}
.dbar-info{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.dbar{height:7px;background:var(--border2);border-radius:4px;overflow:hidden}
.dbar-fill{height:100%;border-radius:4px;transition:width 1.2s var(--ease)}

/* ═══ LEADERBOARD ═══ */
.lb-item{background:linear-gradient(145deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:13px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.lb-rank{font-family:'Orbitron';font-size:20px;font-weight:900;width:28px;flex-shrink:0;direction:ltr}
.lb-info{flex:1}.lb-name{font-weight:700;font-size:13px;color:#fff}.lb-sub{font-size:10px;color:var(--muted);margin-top:2px}
.lb-pts{text-align:center;flex-shrink:0;direction:ltr}.lb-val{font-family:'Orbitron';font-size:14px;font-weight:700}

/* ═══ TOURNAMENT ═══ */
.tour-bracket{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;direction:ltr}
.tour-round{flex-shrink:0;min-width:120px}
.tour-round-title{font-size:10px;color:var(--muted);font-weight:700;margin-bottom:8px;text-align:center}
.tour-match{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 10px;margin-bottom:6px}
.tour-player{font-size:11px;padding:3px 0;display:flex;justify-content:space-between;align-items:center}
.tour-player.winner{color:var(--green);font-weight:700}
.tour-player.loser{color:var(--muted);text-decoration:line-through}
.tour-vs{font-size:9px;color:var(--muted2);text-align:center;margin:2px 0}

/* ═══ INVENTORY ═══ */
.inv-item{background:linear-gradient(145deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:13px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.inv-info{flex:1}.inv-name{font-weight:700;font-size:13px;color:#fff}.inv-sub{font-size:10px;color:var(--muted);margin-top:2px}
.inv-qty{text-align:center;flex-shrink:0;direction:ltr}.inv-num{font-family:'Orbitron';font-size:18px;font-weight:900}
.inv-low{color:var(--red)}.inv-ok{color:var(--green)}.inv-mid{color:var(--yellow)}

/* ═══ MAINTENANCE ═══ */
.maint-item{background:rgba(255,123,53,.06);border:1px solid rgba(255,123,53,.25);border-radius:11px;padding:10px 12px;margin-bottom:7px}
.maint-date{font-size:9px;color:var(--muted)}.maint-note{font-size:12px;color:var(--text);margin-top:3px}

/* ═══ HEATMAP ═══ */
.heatmap{display:grid;grid-template-columns:repeat(24,1fr);gap:2px;margin-bottom:8px;direction:ltr}
.hm-cell{height:14px;border-radius:3px;cursor:pointer;transition:transform .1s}
.hm-cell:hover{transform:scale(1.4)}
.hm-day{display:flex;align-items:center;gap:4px;margin-bottom:4px}
.hm-label{font-size:9px;color:var(--muted);width:22px;flex-shrink:0}

/* ═══ RATING STARS ═══ */
.stars{display:flex;gap:6px;justify-content:center;margin:12px 0;direction:ltr}
.star{font-size:28px;cursor:pointer;transition:.2s;filter:grayscale(1)}.star.active{filter:none;transform:scale(1.15);animation:popIn .25s var(--spring)}

/* ═══ QR ═══ */
#qr-container canvas,#qr-container img{border-radius:12px !important}

/* ═══ SALARY ═══ */
.salary-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:12px}
.salary-row:last-child{border-bottom:none}
.salary-row b{direction:ltr;display:inline-block}

/* ═══ OFFER / BOOKING / SUB / LOYALTY ═══ */
.offer-item{background:linear-gradient(145deg,var(--bg2),var(--bg3));border:1px solid rgba(255,184,0,.2);border-radius:14px;padding:12px;margin-bottom:9px;display:flex;align-items:center;gap:11px}
.booking-item{background:linear-gradient(145deg,var(--bg2),var(--bg3));border:1px solid rgba(255,184,0,.25);border-radius:14px;padding:12px;margin-bottom:9px}
.sub-item{background:linear-gradient(145deg,var(--bg2),var(--bg3));border:1px solid rgba(244,114,182,.2);border-radius:14px;padding:12px;margin-bottom:9px}
.loyalty-item{background:linear-gradient(145deg,var(--bg2),var(--bg3));border:1px solid rgba(255,184,0,.25);border-radius:14px;padding:12px;margin-bottom:9px;display:flex;align-items:center;gap:12px}
.loyalty-pts{font-family:'Orbitron';font-size:22px;color:var(--yellow);font-weight:900;flex-shrink:0;direction:ltr}

/* ═══ REPORT ROW ═══ */
.report-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;align-items:center}
.report-row:last-child{border-bottom:none}
.report-row b{direction:ltr;display:inline-block;font-family:'Orbitron';font-size:11px}

/* ═══ BIRTHDAY ═══ */
.bday-card{background:linear-gradient(135deg,#ec4899 15%,#7c3aed 80%);border:1px solid var(--pink);border-radius:14px;padding:13px;margin-bottom:9px;position:relative;overflow:hidden}
.bday-today{animation:goalDone 2s ease infinite}
.bday-normal{background:linear-gradient(145deg,var(--bg2),var(--bg3));border:1px solid rgba(244,114,182,.25)}

/* ═══ MONTHLY COMPARISON ═══ */
.comp-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border)}
.comp-row:last-child{border-bottom:none}
.comp-month{font-size:11px;font-weight:700;color:#fff;width:65px;flex-shrink:0}
.comp-bar{height:22px;border-radius:6px;display:flex;align-items:center;padding:0 7px;font-family:Orbitron;font-size:9px;font-weight:700;color:#fff;min-width:24px;transition:width 1.2s var(--ease);direction:ltr}
.comp-val{font-family:Orbitron;font-size:10px;color:var(--green);font-weight:700;width:50px;flex-shrink:0;direction:ltr}
.comp-arrow{font-size:11px;width:18px;text-align:center;flex-shrink:0}

/* ═══ CASHIER ═══ */
.cashier-display{background:#000814;border-radius:14px;padding:16px;text-align:center;margin-bottom:12px;border:1px solid rgba(0,229,160,.25);box-shadow:inset 0 2px 12px rgba(0,0,0,.6);direction:ltr}
.cashier-total{font-family:'Orbitron';font-size:28px;color:var(--green);font-weight:900;text-shadow:0 0 12px rgba(0,229,160,.4);letter-spacing:2px}
.cashier-lbl{font-size:10px;color:var(--muted);margin-bottom:4px;direction:rtl;text-align:center}
.cashier-numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;direction:ltr}
.cash-btn{padding:16px;border-radius:12px;border:1px solid var(--border2);background:var(--bg3);color:#fff;font-family:'Cairo';font-size:16px;font-weight:700;cursor:pointer;transition:.12s;text-align:center}
.cash-btn:active{background:rgba(0,200,248,.14);transform:scale(.92);border-color:var(--blue)}
.cash-quick{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;direction:ltr}
.cash-quick-btn{padding:8px 14px;border-radius:10px;border:1px solid rgba(0,229,160,.3);background:rgba(0,229,160,.08);color:var(--green);font-family:'Cairo';font-size:12px;font-weight:700;cursor:pointer;transition:.12s}
.cash-quick-btn:active{background:rgba(0,229,160,.2);transform:scale(.93)}

/* ═══ CALENDAR ═══ */
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cal-title{font-weight:700;font-size:14px;color:#fff}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px}
.cal-day-name{text-align:center;font-size:9px;color:var(--muted);padding:4px 0;font-weight:700}
.cal-day{text-align:center;padding:7px 2px;border-radius:8px;font-size:11px;cursor:pointer;position:relative;transition:.12s}
.cal-day:active{transform:scale(.88)}
.cal-day.today{background:rgba(0,200,248,.15);color:var(--blue);font-weight:700}
.cal-day.has-booking::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--yellow)}
.cal-day.selected{background:var(--blue);color:#000;font-weight:900}
.cal-day.other-month{color:var(--muted2)}

/* ═══ PICKERS ═══ */
.icon-grid,.color-grid{display:flex;flex-wrap:wrap;gap:7px;direction:ltr}
.icon-btn{width:40px;height:40px;border-radius:10px;border:2px solid var(--border2);background:rgba(255,255,255,.03);font-size:18px;cursor:pointer;transition:.12s}
.icon-btn:active{transform:scale(.88)}.icon-btn.sel{border-color:var(--blue);background:rgba(0,200,248,.12);box-shadow:0 0 8px rgba(0,200,248,.2)}
.col-dot{width:30px;height:30px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:.12s}
.col-dot:active{transform:scale(.88)}.col-dot.sel{border-color:#fff;box-shadow:0 0 10px rgba(255,255,255,.4)}

/* ═══ GAME TAGS ═══ */
.games-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.game-tag{display:flex;align-items:center;gap:4px;border-radius:8px;padding:4px 10px;font-size:11px}
.game-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;padding:0;line-height:1;opacity:.7}
.game-del:active{opacity:1}

/* ═══ TOAST (RTL-safe) ═══ */
.toast-wrap{position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:9000;display:flex;flex-direction:column;gap:8px;align-items:center;width:92%;max-width:360px;pointer-events:none}
.toast{border-radius:18px;padding:12px 22px;font-family:'Cairo';font-weight:700;font-size:12.5px;box-shadow:0 8px 36px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.12) inset;text-align:center;backdrop-filter:blur(18px) saturate(180%);-webkit-backdrop-filter:blur(18px);direction:rtl;animation:toastIn .3s cubic-bezier(.34,1.2,.64,1) forwards;white-space:nowrap;max-width:100%;border:1px solid rgba(255,255,255,.12)}

/* ═══ MODAL ═══ */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,8,.78);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(14px) saturate(160%);-webkit-backdrop-filter:blur(14px) saturate(160%)}
.modal-ov.open{display:flex;animation:fadeIn .15s ease}
.modal-sheet{background:linear-gradient(170deg,rgba(10,18,38,.98),rgba(6,12,26,.99));border:1px solid rgba(255,255,255,.12);border-bottom:none;border-radius:28px 28px 0 0;padding:20px 16px 42px;width:100%;max-height:93vh;overflow-y:auto;animation:slideUp .32s cubic-bezier(.34,1.1,.64,1);box-shadow:0 -16px 60px rgba(0,0,0,.7),0 -1px 0 rgba(255,255,255,.1)}
.modal-handle{width:32px;height:3px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 20px}
.modal-title{font-family:'Orbitron';font-size:13px;font-weight:700;background:linear-gradient(90deg,#fff,rgba(255,255,255,.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px;letter-spacing:1px}

/* ═══ EMPTY ═══ */
.empty{text-align:center;padding:48px 20px}
.empty-ic{font-size:54px;margin-bottom:14px;opacity:.45;display:block;animation:idleFloat 3s ease-in-out infinite}
.empty-txt{font-size:15px;font-weight:900;color:var(--text2);margin-bottom:5px}.empty-sub{font-size:11px;color:var(--muted);line-height:1.6;max-width:240px;margin:0 auto}

/* ═══ CHART ═══ */
.chart-wrap{background:linear-gradient(145deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.chart-title{font-weight:700;font-size:13px;color:#fff;margin-bottom:12px}

/* ═══ MISC ═══ */
.inv-logo-preview{width:72px;height:72px;border-radius:12px;object-fit:cover;border:2px solid var(--border2);display:block;margin:6px auto}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--blue3),var(--purple3));border-radius:4px}
::-webkit-scrollbar-track{background:transparent}
::selection{background:rgba(56,189,248,.22);color:#fff}
::-moz-selection{background:rgba(56,189,248,.22);color:#fff}

/* ═══ CONFETTI ═══ */
.confetti-piece{position:fixed;border-radius:2px;pointer-events:none;z-index:9999;animation:confettiDrop 1s ease forwards}

/* ═══ LIGHT MODE ═══ */
body.light-mode{--bg:#f5f7ff;--bg2:#ffffff;--bg3:#f0f4fb;--bg4:#e8eef8;--border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.15);--text:#0f172a;--text2:#374151;--muted:#6b7280;--muted2:#9ca3af;--glass:rgba(0,0,0,.03);--glass2:rgba(0,0,0,.05);background-image:radial-gradient(ellipse 80% 50% at 10% 0%,#dbeafe66,transparent),radial-gradient(ellipse 60% 40% at 90% 90%,#ede9fe44,transparent);}
body.light-mode .card{background:rgba(255,255,255,.95)!important;box-shadow:0 1px 6px rgba(0,0,0,.07)!important}
body.light-mode .modal-sheet{background:rgba(248,250,255,.99)!important}
body.light-mode .header,.body.light-mode .bottom-nav{background:rgba(245,247,255,.94)!important}
body.light-mode input,body.light-mode select,body.light-mode textarea{background:rgba(0,0,0,.04)!important;border-color:rgba(0,0,0,.1)!important}
</style>
</head>
<body>

  <!-- Scan line effect -->
  <div style="position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0">

    <div style="position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);background-size:28px 28px;"></div>

  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinPress('1')">1<span class="pin-sub"></span></button>
    <button class="pin-btn" onclick="pinPress('2')">2<span class="pin-sub">ABC</span></button>
    <button class="pin-btn" onclick="pinPress('3')">3<span class="pin-sub">DEF</span></button>
    <button class="pin-btn" onclick="pinPress('4')">4<span class="pin-sub">GHI</span></button>
    <button class="pin-btn" onclick="pinPress('5')">5<span class="pin-sub">JKL</span></button>
    <button class="pin-btn" onclick="pinPress('6')">6<span class="pin-sub">MNO</span></button>
    <button class="pin-btn" onclick="pinPress('7')">7<span class="pin-sub">PRS</span></button>
    <button class="pin-btn" onclick="pinPress('8')">8<span class="pin-sub">TUV</span></button>
    <button class="pin-btn" onclick="pinPress('9')">9<span class="pin-sub">WXY</span></button>
    <button class="pin-btn action" onclick="tryBiometric()" id="bio-btn">🔬</button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn action" onclick="pinClear()">⌫</button>
  </div>
  <div class="pin-err" id="pin-err"></div>
  <!-- Attempt dots -->
  <div class="pin-attempts" id="pin-attempts">
    <div class="attempt-dot" id="att0"></div>
    <div class="attempt-dot" id="att1"></div>
    <div class="attempt-dot" id="att2"></div>
    <div class="attempt-dot" id="att3"></div>
    <div class="attempt-dot" id="att4"></div>
  </div>
  <div class="lock-footer">
    <button class="lock-footer-btn" onclick="openChangePinModal()">تغيير كلمة السر</button>

<script>
// ══ STORAGE ══
function LS(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function SS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// ══ STATE ══
var DEVICES=LS('gb5_dev',[
  {id:1,name:'PlayStation 5',icon:'🎮',img:'',color:'#00d4ff',rate:20,games:['FIFA 25','Spider-Man 2','God of War'],maint:[]},
  {id:2,name:'PlayStation 4',icon:'🕹️',img:'',color:'#7c3aed',rate:15,games:['GTA V','Mortal Kombat 11'],maint:[]}
]);
var HISTORY=LS('gb5_hist',[]);
var CUSTOMERS=LS('gb5_cust',[]);
var BIRTHDAYS=LS('gb5_bdays',{});   // {name: {day,month,year,phone}}
var CUST_NOTES=LS('gb5_cnotes',{}); // {name: 'note text'}
var OFFERS=LS('gb5_off',[]);
var BOOKINGS=LS('gb5_book',[]);
var SUBS=LS('gb5_subs',[]);
var LOYALTY=LS('gb5_loy',{});
var EMPLOYEES=LS('gb5_emp',[{id:1,name:'المدير',icon:'👑',pin:'1234',role:'admin',active:true,phone:'',salary:0,notes:'',joinDate:''}]);
var INVENTORY=LS('gb5_inv',[
  {id:1,name:'مياه',icon:'💧',qty:24,minQty:5,price:5},
  {id:2,name:'كولا',icon:'🥤',qty:12,minQty:5,price:10},
  {id:3,name:'شيبس',icon:'🍟',qty:8,minQty:3,price:8}
]);
var TOURNAMENTS=LS('gb5_tour',[]);
var RATINGS=LS('gb5_rat',[]);
var WAIT_QUEUE=LS('gb5_queue',{});
var SETTINGS=LS('gb5_set',{
  pin:'',pinOn:false,shopName:'Game Billing Pro',shopLogo:'',shopAddress:'',
  vat:0,loyaltyRate:10,loyaltyRedeem:100,soundOn:true,vibrateOn:true,autoBackup:true,
  empSalaryPct:{}
});
var SESSIONS={};
var CUR_EMP=EMPLOYEES[0]||{name:'المدير',role:'admin'};
var CUR_TAB='sessions';
var _pick={icon:'🎮',color:'#00d4ff'};
var _charts={};
var _calYear=new Date().getFullYear(),_calMonth=new Date().getMonth(),_calSel=null;
var _cashBuf='',_cashTotal=0;
var _moreTab='stats';
var _custSearch='';
var _selectedStar=0;

// ══ ICONS/COLORS ══
var ICONS=['🎮','🕹️','👾','🖥️','📺','🏆','⚡','🔥','💻','🎯','🎪','🃏'];
var COLORS=['#00c8f8','#7c3aed','#ffb800','#00e5a0','#ff4560','#f472b6','#ff7b35','#06b6d4'];

// ══ HELPERS ══
function fmt(s){return pad(Math.floor(s/3600))+':'+pad(Math.floor(s%3600/60))+':'+pad(s%60);}
function pad(n){return String(n).padStart(2,'0');}
function calcCost(s,r,d){return Math.max(0,(s/3600)*r*(1-(d||0)/100));}
function todayStr(){return new Date().toLocaleDateString('ar-EG');}
function monthStr(){var d=new Date();return(d.getMonth()+1)+'/'+d.getFullYear();}
function nowStr(){return new Date().toLocaleTimeString('ar-EG');}
function getElapsed(did){var s=SESSIONS[did];if(!s)return 0;if(s.paused)return s.pausedEl||0;return(s.pausedEl||0)+Math.floor((Date.now()-s.resumedAt)/1000);}
function esc(s){return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function devImg(dev){if(dev.img)return '<img src="'+esc(dev.img)+'" alt="" onerror="this.style.display=\'none\'"/>';return dev.icon||'🎮';}

function toast(msg,type){
  var el=document.createElement('div');el.className='toast';
  if(type==='red'){el.style.background='linear-gradient(135deg,#ff4560,#dc2626)';el.style.color='#fff';}
  else if(type==='yellow'){el.style.background='linear-gradient(135deg,#ffb800,#d97706)';el.style.color='#000';}
  else{el.style.background='linear-gradient(135deg,#00e5a0,#059669)';el.style.color='#000';}
  el.textContent=msg;
  var wrap=document.getElementById('toasts');
  wrap.appendChild(el);
  // Remove old toasts if too many
  var all=wrap.querySelectorAll('.toast');
  if(all.length>3){all[0].remove();}
  setTimeout(function(){
    el.style.animation='toastOut .25s ease forwards';
    setTimeout(function(){if(el.parentNode)el.remove();},260);
  },2800);
}
function vibrate(ms){if(SETTINGS.vibrateOn&&navigator.vibrate)navigator.vibrate(ms||200);}
function beep(freq,dur){
  if(!SETTINGS.soundOn)return;
  try{var ctx=new(window.AudioContext||window.webkitAudioContext)();var o=ctx.createOscillator();var g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;g.gain.setValueAtTime(.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);o.start();o.stop(ctx.currentTime+dur);}catch(e){}
}
function soundStart(){beep(880,.1);setTimeout(function(){beep(1100,.15);},120);}
function soundStop(){beep(440,.15);setTimeout(function(){beep(330,.25);},180);}
function soundAlert(){beep(660,.08);setTimeout(function(){beep(880,.08);},100);setTimeout(function(){beep(660,.25);},200);}

var _prevHeaderVals={active:-1,today:-1,total:-1};
function updateHeader(){
  var active=Object.keys(SESSIONS).length;
  var activeEst=Object.keys(SESSIONS).reduce(function(s,did){
    var sess=SESSIONS[did];var dev=DEVICES.find(function(d){return d.id===parseInt(did);});
    return s+(dev?calcCost(getElapsed(parseInt(did)),dev.rate,sess.discount):0);
  },0);
  var td=HISTORY.filter(function(h){return h.date===todayStr();}).reduce(function(s,h){return s+parseFloat(h.cost)||0;},0);
  var tt=HISTORY.reduce(function(s,h){return s+parseFloat(h.cost)||0;},0);

  var hActive=document.getElementById('h-active');
  var hToday=document.getElementById('h-today');
  var hTotal=document.getElementById('h-total');

  function animVal(el,val){
    if(!el)return;
    el.style.animation='none';void el.offsetWidth;
    el.style.animation='statPop .3s var(--spring)';
    el.textContent=val;
  }

  if(hActive&&active!==_prevHeaderVals.active){
    animVal(hActive,active);
    _prevHeaderVals.active=active;
    // Color: green if sessions active, blue if none
    hActive.style.color=active>0?'var(--green)':'var(--blue)';
  }
  if(hToday){
    var todayAmt=(td+activeEst);
    var todayDisplay=todayAmt>=1000?(todayAmt/1000).toFixed(1)+'k':todayAmt.toFixed(0);
    if(todayDisplay!==_prevHeaderVals.todayDisp){
      animVal(hToday,todayDisplay);
      _prevHeaderVals.todayDisp=todayDisplay;
    }
    _prevHeaderVals.today=td;
  }
  if(hTotal&&Math.abs(tt-_prevHeaderVals.total)>0.1){
    var totalDisplay=tt>=1000?(tt/1000).toFixed(1)+'k':tt.toFixed(0);
    hTotal.textContent=totalDisplay;
    _prevHeaderVals.total=tt;
  }

  var hEmp=document.getElementById('hdr-emp');
  if(hEmp)hEmp.textContent=(CUR_EMP.icon||'👤')+' '+CUR_EMP.name;
  var sn=document.getElementById('hdr-shopname');
  if(sn)sn.textContent=SETTINGS.shopName||'GAME BILLING PRO';
  // Show date in subtitle
  var hDate=document.getElementById('hdr-date');
  if(hDate){var d=new Date();hDate.textContent=d.toLocaleDateString('ar-EG',{weekday:'short',day:'numeric',month:'short'});}
  var dlCust=document.getElementById('dl-cust');
  if(dlCust)dlCust.innerHTML=CUSTOMERS.map(function(c){return '<option value="'+esc(c)+'"/>';}).join('');
}

// ══ NOTIFICATIONS ══
function reqNotif(){if(window.Notification&&Notification.permission==='default')Notification.requestPermission();}
function sendNotif(title,body){if(!window.Notification||Notification.permission!=='granted')return;try{new Notification(title,{body:body});}catch(e){}}

// ══ PERMISSIONS ══
function canDo(p){
  var r=CUR_EMP.role||'admin';
  if(r==='admin')return true;
  // Cashier: can do sessions, cashier, bookings, history, customers — NOT employees/settings
  if(r==='cashier')return['session','cashier','bookings','history','customers','loyalty','coupons','packages'].indexOf(p)>=0;
  // Viewer: stats and history only
  return['history','stats'].indexOf(p)>=0;
}
function isAdmin(){return(CUR_EMP.role||'admin')==='admin';}
function checkPerm(p){if(!canDo(p)){toast('ليس لديك صلاحية','red');return false;}return true;}

// ══ PIN / LOCK ══
var pinBuf='',pinMode='unlock',pinNew='';
// ══════════════════════════════════════════════════════
// ✦ SECURITY SYSTEM v2 — PIN + Biometric + Auto-Lock
// ══════════════════════════════════════════════════════
var pinMode='unlock';
var pinBuf='';
var pinNew='';
var _pinAttempts=0;
var _MAX_ATTEMPTS=5;
var _cooldownTimer=null;
var _autoLockTimer=null;
var _AUTOLOCK_MS=(SETTINGS.autoLockMin||5)*60*1000;

// Update lock screen shop name
function initLockScreen(){
  var sn=document.getElementById('lock-shopname');
  if(sn)sn.textContent=SETTINGS.shopName||'';
}

function checkLock(){
  initLockScreen();
  if(SETTINGS.pinOn&&SETTINGS.pin){
    document.getElementById('lock-screen').style.display='flex';
    document.getElementById('main-app').style.display='none';
    pinMode='unlock';
  }
  resetAutoLock();
}

// ── PIN Input ─────────────────────────────────────────
function pinPress(d){
  if(pinBuf.length>=4)return;
  if(_cooldownTimer)return;
  pinBuf+=d;
  updateDots();
  // Haptic
  vibrate(10);
  if(pinBuf.length===4)setTimeout(pinCheck,180);
}

function pinClear(){
  if(_cooldownTimer)return;
  pinBuf=pinBuf.slice(0,-1);
  updateDots();
}

function updateDots(){
  for(var i=0;i<4;i++){
    var d=document.getElementById('d'+i);
    if(!d)continue;
    d.className='pin-dot'+(i<pinBuf.length?' filled':'');
  }
}

function updateAttemptDots(){
  for(var i=0;i<5;i++){
    var d=document.getElementById('att'+i);
    if(d)d.className='attempt-dot'+(i<_pinAttempts?' used':'');
  }
}

function pinCheck(){
  var errEl=document.getElementById('pin-err');
  function showErr(msg){
    if(errEl){errEl.textContent=msg;errEl.classList.remove('shake');void errEl.offsetWidth;errEl.classList.add('shake');}
    // Flash dots red
    for(var i=0;i<4;i++){var d=document.getElementById('d'+i);if(d)d.className='pin-dot error';}
    setTimeout(function(){pinBuf='';updateDots();},400);
    vibrate([80,60,80]);
  }
  if(pinMode==='unlock'){
    if(pinBuf===SETTINGS.pin){
      unlockSuccess();
    } else {
      _pinAttempts++;
      updateAttemptDots();
      addAuditLog('محاولة دخول فاشلة','المحاولة '+_pinAttempts+' من '+_MAX_ATTEMPTS);
      if(_pinAttempts>= _MAX_ATTEMPTS){
        startCooldown(30);
        showErr('🚫 تم تجاوز الحد — انتظر 30 ثانية');
      } else {
        var remaining=_MAX_ATTEMPTS-_pinAttempts;
        showErr('❌ خاطئة — تبقى '+remaining+(remaining===1?' محاولة':' محاولات'));
      }
    }
  } else if(pinMode==='set'){
    pinNew=pinBuf;pinBuf='';updateDots();
    pinMode='confirm';
    if(errEl)errEl.textContent='';
    document.getElementById('lock-sub').textContent='أعد الإدخال للتأكيد';
  } else if(pinMode==='confirm'){
    if(pinBuf===pinNew){
      SETTINGS.pin=pinNew;SETTINGS.pinOn=true;SS('gb5_set',SETTINGS);
      unlockSuccess();
      toast('✅ تم تعيين كلمة السر');closeModal();
    } else {
      showErr('❌ غير متطابق — أعد المحاولة');
      pinMode='set';
    }
  }
}

function unlockSuccess(){
  _pinAttempts=0;
  updateAttemptDots();
  pinBuf='';pinNew='';updateDots();
  var lock=document.getElementById('lock-screen');
  lock.style.transition='opacity .3s ease';
  lock.style.opacity='0';
  setTimeout(function(){
    lock.style.display='none';lock.style.opacity='';lock.style.transition='';
    var app=document.getElementById('main-app');
    app.style.display='block';app.style.opacity='0';
    setTimeout(function(){app.style.opacity='1';},20);
  },300);
  var errEl=document.getElementById('pin-err');
  if(errEl)errEl.textContent='';
  resetAutoLock();
  addAuditLog('دخول ناجح','تم فتح القفل');
}

// ── Cooldown ──────────────────────────────────────────
function startCooldown(seconds){
  var overlay=document.getElementById('lock-cooldown');
  var timer=document.getElementById('cooldown-timer');
  if(overlay)overlay.style.display='flex';
  var remaining=seconds;
  if(timer)timer.textContent=remaining;
  _cooldownTimer=setInterval(function(){
    remaining--;
    if(timer)timer.textContent=remaining;
    if(remaining<=0){
      clearInterval(_cooldownTimer);_cooldownTimer=null;
      if(overlay)overlay.style.display='none';
      _pinAttempts=0;updateAttemptDots();
      var errEl=document.getElementById('pin-err');
      if(errEl)errEl.textContent='يمكنك المحاولة الآن';
    }
  },1000);
}

// ── Auto-Lock ─────────────────────────────────────────
function resetAutoLock(){
  if(_autoLockTimer)clearTimeout(_autoLockTimer);
  var mins=SETTINGS.autoLockMin||0;
  if(!mins||!SETTINGS.pinOn||!SETTINGS.pin)return;
  _autoLockTimer=setTimeout(function(){
    lockApp();
    toast('🔐 تم القفل التلقائي','yellow');
  },mins*60000);
}

function lockApp(){
  if(!SETTINGS.pin)return;
  pinBuf='';updateDots();
  document.getElementById('lock-screen').style.display='flex';
  document.getElementById('main-app').style.display='none';
  pinMode='unlock';
  initLockScreen();
  addAuditLog('قفل تلقائي','بعد '+SETTINGS.autoLockMin+' دقيقة');
}

// Reset timer on any interaction
['touchstart','click','keydown'].forEach(function(e){
  document.addEventListener(e,function(){if(SETTINGS.autoLockMin&&SETTINGS.pinOn)resetAutoLock();},{passive:true});
});

// ── Biometric ─────────────────────────────────────────
function tryBiometric(){
  if(!window.PublicKeyCredential){
    var bioBtn=document.getElementById('bio-btn');
    if(bioBtn)bioBtn.style.display='none';
    return;
  }
  // Check if platform authenticator available
  PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable()
    .then(function(available){
      if(!available){toast('البصمة غير متوفرة على هذا الجهاز','yellow');return;}
      // For demo: show "would use biometrics" 
      // In production, implement full WebAuthn registration/assertion flow
      var errEl=document.getElementById('pin-err');
      if(errEl)errEl.textContent='🔬 جارٍ التحقق من البصمة...';
      setTimeout(function(){
        if(SETTINGS.bioEnabled){
          // Simulate successful biometric (real impl needs server)
          unlockSuccess();
        } else {
          if(errEl)errEl.textContent='فعّل البصمة من الإعدادات أولاً';
        }
      },800);
    })
    .catch(function(){});
}

// ── Emergency Reset ───────────────────────────────────
function showEmergencyReset(){
  openModal('<div class="modal-title">🆘 إعادة تعيين كلمة السر</div>'+
    '<div style="background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.2);border-radius:13px;padding:14px;margin-bottom:14px">'+
      '<div style="font-size:11px;color:var(--text2);line-height:1.7">لإعادة التعيين، ستُحذف كلمة السر الحالية. تأكد أنك مالك النظام.</div>'+
    '</div>'+
    '<div class="form-group"><label class="form-label">كلمة السر الجديدة (4 أرقام)</label><input id="er-new" type="password" maxlength="4" inputmode="numeric" placeholder="----" dir="ltr" style="text-align:center;font-size:20px;letter-spacing:8px"/></div>'+
    '<div class="btn-row" style="margin-top:12px">'+
      '<button class="btn btn-red" onclick="confirmEmergencyReset()">إعادة تعيين</button>'+
      '<button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>'+
    '</div>');
}

function confirmEmergencyReset(){
  var newPin=(document.getElementById('er-new').value||'').trim();

  SETTINGS.pin=newPin;SETTINGS.pinOn=true;SS('gb5_set',SETTINGS);

  closeModal();unlockSuccess();toast('✅ تم تعيين كلمة السر الجديدة');

function setAutoLock(v){
  SETTINGS.autoLockMin=parseInt(v)||0;
  SS('gb5_set',SETTINGS);
  resetAutoLock();
  toast(v>0?'🔐 قفل تلقائي بعد '+v+' دقيقة':'🔓 القفل التلقائي معطّل','yellow');
}

function toggleBiometric(){
  SETTINGS.bioEnabled=!SETTINGS.bioEnabled;SS('gb5_set',SETTINGS);
  closeModal();toast(SETTINGS.bioEnabled?'✅ تم تفعيل البصمة':'🔓 تم إيقاف البصمة');
}

function startSetPin(){
  closeModal();
  document.getElementById('lock-screen').style.display='flex';
  document.getElementById('main-app').style.display='none';
  pinMode='set';pinBuf='';pinNew='';updateDots();
  initLockScreen();
  document.getElementById('lock-sub').textContent='أدخل كلمة السر الجديدة (4 أرقام)';
  var errEl=document.getElementById('pin-err');if(errEl)errEl.textContent='';
}

function disablePin(){
  SETTINGS.pinOn=false;SETTINGS.pin='';SS('gb5_set',SETTINGS);
  closeModal();toast('🔓 تم إيقاف القفل','yellow');
  addAuditLog('إيقاف القفل','تم إيقاف حماية PIN');
}

// ══ TABS ══
var _sessionsRendered=false; // declared here so gotoTab can reference it
function gotoTab(t,btn){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('page-'+t).classList.add('active');btn.classList.add('active');CUR_TAB=t;
  // Reset animation flag so cards animate fresh on each tab visit
  if(t==='sessions')_sessionsRendered=false;
  renderTab(t);
}
function renderTab(t){
  if(t==='sessions')renderSessions();
  else if(t==='devices')renderDevices();
  else if(t==='cashier')renderCashier();
  else if(t==='customers')renderCustomers();
  else if(t==='more')renderMore();
}

// ══ TICK — only update timers, NOT full re-render ══
var _lastSessionCount=0;
var _lastSessionKeys='';
setInterval(function(){
  // Check time limit alerts
  Object.keys(SESSIONS).forEach(function(did){
    var s=SESSIONS[did];
    if(!s.paused&&s.timeLimit>0){
      var el=getElapsed(parseInt(did));
      if(el>=s.timeLimit*60&&!s.alerted){
        var dev=DEVICES.find(function(d){return d.id===parseInt(did);});
        toast('⏰ انتهى الوقت! '+(dev?dev.name:'')+'- '+(s.customer||'زائر'),'yellow');
        soundAlert();vibrate([200,100,200]);
        sendNotif('⏰ انتهى الوقت!',s.customer||'زائر');s.alerted=true;
      }
    }
  });

  // Only do full re-render if sessions count changed (session started/stopped)
  var curKeys=Object.keys(SESSIONS).sort().join(',');
  if(CUR_TAB==='sessions'){
    if(curKeys!==_lastSessionKeys){
      // Sessions changed → full re-render with animation
      _lastSessionKeys=curKeys;
      renderSessions();
    } else {
      // Same sessions → only update timers in-place (no flash)
      updateTimersInPlace();
    }
  }
  updateHeader();
},1000);

function updateTimersInPlace(){
  Object.keys(SESSIONS).forEach(function(did){
    var s=SESSIONS[did];var dev=DEVICES.find(function(d){return d.id===parseInt(did);});
    if(!dev)return;
    var el=getElapsed(parseInt(did));
    var cost=calcCost(el,dev.rate,s.discount);
    // Update timer display without re-rendering
    var timerEl=document.querySelector('[data-did="'+did+'"] .timer');
    var costEl=document.querySelector('[data-did="'+did+'"] .timer-cost');
    var progEl=document.querySelector('[data-did="'+did+'"] .prog-fill');
    if(timerEl)timerEl.textContent=fmt(el);
    if(costEl)costEl.textContent='💰 '+cost.toFixed(2)+' ج'+(SETTINGS.vat>0?' (+'+SETTINGS.vat+'% ض)':'');
    if(progEl&&s.timeLimit>0){
      var pct=Math.min(100,(el/(s.timeLimit*60))*100);
      progEl.style.width=pct+'%';
      var bc=pct>=90?'var(--red)':dev.color;
      progEl.style.background=bc;
    }
  });
}

  var lowInv=INVENTORY.filter(function(i){return i.qty<=i.minQty;});
  var lowAlert=lowInv.length?'<div style="background:rgba(255,123,53,.08);border:1px solid rgba(255,123,53,.3);border-radius:13px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--orange);display:flex;align-items:center;gap:8px"><span style="font-size:16px">⚠️</span><div>مخزون منخفض: '+lowInv.map(function(i){return '<b>'+i.icon+i.name+'</b>('+i.qty+')';}).join(' · ')+'</div></div>':'';

    '<button class="btn btn-blue" style="padding:10px 4px;font-size:10px;min-width:0" onclick="openQRScanner()">📷<br/><span style="font-size:9px">QR</span></button>'+

    '<button class="btn btn-ghost" style="padding:10px 4px;font-size:10px;min-width:0" onclick="openBulkAddGames()">🎮+<br/><span style="font-size:9px">ألعاب</span></button>'+
    '<button class="btn btn-ghost" style="padding:10px 4px;font-size:10px;min-width:0" onclick="openDisplayBoard()">📺<br/><span style="font-size:9px">لوحة</span></button>'+
    '<button class="btn btn-ghost" style="padding:10px 4px;font-size:10px;min-width:0" onclick="openQuickStats()">⚡<br/><span style="font-size:9px">إحصاء</span></button>'+
  '</div>';
  el.innerHTML=quickBar+renderGoalWidget()+lowAlert+DEVICES.map(function(dev){return renderDevCard(dev);}).join('');
  // Animate cards on initial render or after tab switch — uses CSS transition not keyframes
  if(!_sessionsRendered){

    cards.forEach(function(c,i){

      },delay,c);
    });
  }

function updateLoyaltySel(cust){
  var sel=document.getElementById('m-pts');var info=document.getElementById('pts-info');
  if(!sel||!info)return;
  var L=LOYALTY[cust];
  if(L&&L.pts>0){
    sel.innerHTML='<option value="0">بدون نقاط</option>';
    for(var i=SETTINGS.loyaltyRedeem;i<=L.pts;i+=SETTINGS.loyaltyRedeem){
      sel.innerHTML+='<option value="'+i+'">'+i+' نقطة = '+(i/SETTINGS.loyaltyRedeem).toFixed(2)+' ج خصم</option>';
    }
    info.textContent='🏅 لديك '+L.pts+' نقطة';
  }else{sel.innerHTML='<option value="0">لا يوجد نقاط</option>';info.textContent='';}
  // ── AUTO-APPLY SUBSCRIPTION DISCOUNT ──
  if(cust){
    var sub=SUBS.find(function(s){return s.customer===cust&&s.active;});
    if(sub){
      var discSel=document.getElementById('m-disc');
      if(discSel){
        // add sub option if not there
        var exists=Array.from(discSel.options).some(function(o){return o.value==='sub_'+sub.id;});
        if(!exists){
          var opt=document.createElement('option');
          opt.value='sub_'+sub.id;
          opt.textContent='🔁 اشتراك شهري — '+sub.discount+'% (تلقائي)';
          opt.selected=true;
          discSel.insertBefore(opt,discSel.options[1]);
          discSel.value='sub_'+sub.id;
        } else {discSel.value='sub_'+sub.id;}
        // hide custom disc
        var w=document.getElementById('cdisc-wrap');if(w)w.style.display='none';
        // show badge
        var badge=document.getElementById('sub-badge');
        if(!badge){
          badge=document.createElement('div');badge.id='sub-badge';
          badge.style.cssText='background:rgba(244,114,182,0.09);border:1px solid rgba(244,114,182,0.25);border-radius:9px;padding:7px 11px;font-size:11px;color:var(--pink);margin-bottom:9px;text-align:center';
          badge.textContent='🔁 اشتراك نشط — خصم '+sub.discount+'% سيُطبّق تلقائياً · جلسات متبقية: '+(sub.sessionsLimit>0?Math.max(0,sub.sessionsLimit-sub.sessionsUsed):'غير محدود');
          var discGroup=discSel.parentElement.parentElement;
          if(discGroup)discGroup.parentElement.insertBefore(badge,discGroup);
        }
      }
    } else {
      // remove sub badge if no sub
      var b=document.getElementById('sub-badge');if(b)b.remove();
    }
  }
  // ── CREDIT CHECK ──
  if(cust){
    var credit=CUSTOMER_CREDIT[cust]||0;
    var credInfo=document.getElementById('cred-info');
    if(!credInfo){credInfo=document.createElement('div');credInfo.id='cred-info';credInfo.style.cssText='font-size:10px;margin-bottom:8px';var pts=document.getElementById('pts-info');if(pts&&pts.parentElement)pts.parentElement.insertBefore(credInfo,pts.nextSibling);}
    if(credit>0){credInfo.style.color='var(--green)';credInfo.textContent='💳 رصيد مسبق: '+credit.toFixed(2)+' ج';}
    else credInfo.textContent='';
  }
}
function fillFromBook(did){
  var sel=document.getElementById('m-book');if(!sel)return;
  if(sel.value.startsWith('book_')){
    var bk=BOOKINGS.find(function(b){return b.id===parseInt(sel.value.replace('book_',''));});
    if(bk){
      var c=document.getElementById('m-cust');if(c){c.value=bk.customer;updateLoyaltySel(bk.customer);}
      var gs=document.getElementById('m-game');
      if(gs&&bk.game){for(var i=0;i<gs.options.length;i++){if(gs.options[i].value===bk.game){gs.selectedIndex=i;break;}}}
    }
  }
}
function toggleCDisc(sel){
  var w=document.getElementById('cdisc-wrap');
  if(w)w.style.display=sel.value==='custom'?'block':'none';
}
var _appliedCouponId=null;
function verifyCouponInput(){
  var code=(document.getElementById('m-coupon').value||'').trim().toUpperCase();
  var statusEl=document.getElementById('coupon-status');
  if(!code){if(statusEl)statusEl.textContent='';return;}
  var c=applyCouponCode(code);
  if(c){
    _appliedCouponId=c.id;
    if(statusEl){statusEl.style.color='var(--green)';statusEl.textContent='✅ كوبون صالح — خصم '+c.discount+'%'+(c.maxUses>0?' (متبقي '+(c.maxUses-c.used)+')':'');}
    toast('🎫 كوبون مقبول! خصم '+c.discount+'%');
  } else {
    _appliedCouponId=null;
    if(statusEl){statusEl.style.color='var(--red)';statusEl.textContent='❌ كوبون غير صالح أو منتهي';}
  }
}
function confirmStart(did){
  var cust=(document.getElementById('m-cust').value||'').trim();
  var game=document.getElementById('m-game').value||'';
  var discEl=document.getElementById('m-disc');var discVal=discEl?discEl.value:'0';
  var disc=0;var subId=null;
  if(discVal.startsWith('sub_')){
    subId=parseInt(discVal.replace('sub_',''));
    var sub=SUBS.find(function(s){return s.id===subId;});
    if(sub){disc=sub.discount;}
  } else if(discVal==='custom'){
    disc=Number((document.getElementById('m-cdisc')||{value:0}).value)||0;
  } else {disc=Number(discVal)||0;}
  var tl=Number((document.getElementById('m-tl')||{value:0}).value)||0;
  var usedPts=Number((document.getElementById('m-pts')||{value:0}).value)||0;
  var tourEl=document.getElementById('m-tour');var tour=tourEl?tourEl.value:'';
  // ── APPLY COUPON ──
  if(_appliedCouponId){
    var coup=COUPONS.find(function(c){return c.id===_appliedCouponId;});
    if(coup&&coup.discount>disc){disc=coup.discount;useCoupon(_appliedCouponId);toast('🎫 تم تطبيق الكوبون — خصم '+disc+'%');}
    _appliedCouponId=null;
  }
  var bookSel=document.getElementById('m-book');
  if(bookSel&&bookSel.value.startsWith('book_')){
    var bid=parseInt(bookSel.value.replace('book_',''));
    BOOKINGS=BOOKINGS.map(function(b){return b.id===bid?Object.assign({},b,{status:'confirmed'}):b;});SS('gb5_book',BOOKINGS);
  }
  // ── DEDUCT SUBSCRIPTION SESSION ──
  if(subId){
    SUBS=SUBS.map(function(s){
      if(s.id!==subId)return s;
      var used=s.sessionsUsed+1;
      var active=s.active;
      if(s.sessionsLimit>0&&used>=s.sessionsLimit)active=false;
      return Object.assign({},s,{sessionsUsed:used,active:active});
    });
    SS('gb5_subs',SUBS);
    var sub2=SUBS.find(function(s){return s.id===subId;});
    if(sub2&&!sub2.active){toast('⚠️ انتهى عدد جلسات الاشتراك لـ '+cust,'yellow');}
    else if(sub2&&sub2.sessionsLimit>0){toast('🔁 جلسة اشتراك — متبقي '+(sub2.sessionsLimit-sub2.sessionsUsed));}
  }
  if(cust&&CUSTOMERS.indexOf(cust)<0){CUSTOMERS.unshift(cust);CUSTOMERS=CUSTOMERS.slice(0,25);SS('gb5_cust',CUSTOMERS);}
  SESSIONS[did]={customer:cust,game:game,discount:disc,subId:subId,usedPoints:usedPts,tournament:tour,
    timeLimit:tl,pausedEl:0,resumedAt:Date.now(),paused:false,alerted:false,
    startedAt:new Date().toLocaleString('ar-EG'),employee:CUR_EMP.name};
  soundStart();vibrate(100);closeModal();renderSessions();updateHeader();
  var dev=DEVICES.find(function(d){return d.id===did;});
  toast('▶ بدأت جلسة '+(dev?dev.name:'')+(disc>0?' · خصم '+disc+'%':''));
}
function pauseSess(did){var el=getElapsed(did);SESSIONS[did].pausedEl=el;SESSIONS[did].paused=true;renderSessions();toast('⏸ موقوف مؤقتاً — '+fmt(el),'yellow');}
function resumeSess(did){SESSIONS[did].paused=false;SESSIONS[did].resumedAt=Date.now();renderSessions();toast('▶ استؤنفت الجلسة');}
function stopSess(did,print){
  var s=SESSIONS[did];if(!s)return;
  var dev=DEVICES.find(function(d){return d.id===did;});
  var el=getElapsed(did);
  var finalCost=calcCost(el,dev.rate,s.discount);
  if(s.usedPoints>0)finalCost=Math.max(0,finalCost-(s.usedPoints/SETTINGS.loyaltyRedeem));
  var vatAmt=SETTINGS.vat>0?finalCost*(SETTINGS.vat/100):0;
  var rec={id:Date.now(),deviceId:did,device:dev.name,icon:dev.icon,color:dev.color,
    customer:s.customer||'زائر',game:s.game||'—',elapsed:el,duration:fmt(el),
    cost:finalCost.toFixed(2),vatAmt:vatAmt.toFixed(2),discount:s.discount,rate:dev.rate,
    date:todayStr(),month:monthStr(),time:nowStr(),startedAt:s.startedAt,
    employee:s.employee||CUR_EMP.name,usedPoints:s.usedPoints||0,tournament:s.tournament||''};
  // Loyalty points
  if(rec.customer&&rec.customer!=='زائر'){
    var pts=Math.floor(finalCost*SETTINGS.loyaltyRate);
    if(!LOYALTY[rec.customer])LOYALTY[rec.customer]={pts:0,total:0};
    LOYALTY[rec.customer].pts=Math.max(0,LOYALTY[rec.customer].pts+(pts-(s.usedPoints||0)));
    LOYALTY[rec.customer].total+=finalCost;SS('gb5_loy',LOYALTY);
    if(pts>0)toast('🏅 +'+pts+' نقطة لـ '+rec.customer);
  }
  // Emp salary tracking
  if(!SETTINGS.empSalaryPct)SETTINGS.empSalaryPct={};
  if(!SETTINGS.empRevenue)SETTINGS.empRevenue={};
  if(!SETTINGS.empRevenue[rec.employee])SETTINGS.empRevenue[rec.employee]=0;
  SETTINGS.empRevenue[rec.employee]+=finalCost;SS('gb5_set',SETTINGS);
  // Tournament update
  if(s.tournament&&rec.customer){
    var t=TOURNAMENTS.find(function(x){return x.name===s.tournament;});
    if(t){
      if(!t.scores)t.scores={};
      if(!t.scores[rec.customer])t.scores[rec.customer]={sessions:0,time:0};
      t.scores[rec.customer].sessions++;t.scores[rec.customer].time+=el;
      SS('gb5_tour',TOURNAMENTS);
    }
  }
  // Move queue next
  if(WAIT_QUEUE[did]&&WAIT_QUEUE[did].length>0){
    var next=WAIT_QUEUE[did][0];
    toast('👤 التالي في الانتظار: '+next.customer,'yellow');
    sendNotif('جهازك جاهز!',next.customer+' — '+dev.name);
  }
  HISTORY.unshift(rec);SS('gb5_hist',HISTORY);delete SESSIONS[did];
  soundStop();vibrate([100,50,100]);
  sendNotif('⏹ انتهت الجلسة',dev.name+' — '+finalCost.toFixed(2)+' ج');
  renderSessions();updateHeader();toast('✅ انتهت الجلسة — '+finalCost.toFixed(2)+' ج');
  if(print)setTimeout(function(){printInvoice(rec,dev);},300);
  openRatingModal(rec);
  return rec;
}

          '<span style="font-size:22px">'+i.icon+'</span>'+

            '<div style="font-size:10px;color:'+(lowStock?'var(--red)':'var(--muted)')+'">باقي: '+i.qty+'</div>'+

}
function setCashTotal(v){_cashTotal=parseFloat(v)||0;var el=document.getElementById('cash-total');if(el)el.textContent=_cashTotal.toFixed(2);updateChange();}
function cashNum(d){if(d==='.'&&_cashBuf.indexOf('.')>=0)return;if(_cashBuf.length>=8)return;_cashBuf+=String(d);var el=document.getElementById('cash-paid');if(el)el.textContent=_cashBuf||'0';updateChange();}
function cashDel(){_cashBuf=_cashBuf.slice(0,-1);var el=document.getElementById('cash-paid');if(el)el.textContent=_cashBuf||'0';updateChange();}
function updateChange(){var paid=parseFloat(_cashBuf)||0;var change=paid-_cashTotal;var el=document.getElementById('cash-change');if(el){el.textContent=(change>=0?change.toFixed(2):'ناقص '+Math.abs(change).toFixed(2))+' ج';el.style.color=change>=0?'var(--green)':'var(--red)';}}
function resetCash(){_cashBuf='';_cashTotal=0;renderCashier();}
function confirmCashPay(){
  var paid=parseFloat(_cashBuf)||0;
  if(_cashTotal<=0||paid<=0){toast('أدخل المبلغين','red');return;}
  var change=paid-_cashTotal;
  var msg=change>=0?'✅ تم الدفع — الباقي: '+change.toFixed(2)+' ج':'⚠️ ناقص: '+Math.abs(change).toFixed(2)+' ج';
  toast(msg,change>=0?'':'yellow');
  if(change>=0){vibrate([100,50,100]);resetCash();}
}

    '</div>'+

    '</div>'+

function mcash(v){var el=document.getElementById('mc-paid');if(el){el.value=v;mcalcChg(parseFloat(document.querySelector('#modal-body .cashier-display div:last-child')||{textContent:0}).textContent||0);mcalcChg(v);}}
function mcalcChg(total){var paid=parseFloat((document.getElementById('mc-paid')||{value:0}).value)||0;var change=paid-parseFloat(total);var el=document.getElementById('mc-change');if(el){el.textContent=(change>=0?change.toFixed(2):'ناقص '+Math.abs(change).toFixed(2))+' ج';el.style.color=change>=0?'var(--green)':'var(--red)';}}
function confirmMCash(total,did){var paid=parseFloat((document.getElementById('mc-paid')||{value:0}).value)||0;if(paid<=0){toast('أدخل المبلغ','red');return;}var change=paid-total;closeModal();toast('✅ الباقي: '+(change>=0?change.toFixed(2):'0')+' ج');vibrate([100,50,100]);if(did&&SESSIONS[did])stopSess(did,false);}
function sellInventoryItem(id){
  var item=INVENTORY.find(function(i){return i.id===id;});
  if(item&&item.qty<=0){toast('نفد المخزون!','red');return;}
  INVENTORY=INVENTORY.map(function(i){return i.id===id?Object.assign({},i,{qty:i.qty-1}):i;});
  SS('gb5_inv',INVENTORY);

}

function renderBookings(){
  var el=document.getElementById('page-bookings');
  el.innerHTML='<div class="sec-head"><div class="sec-title">الحجوزات</div><button class="add-btn" style="background:linear-gradient(135deg,var(--yellow),#d97706)" onclick="openAddBooking()">+ حجز</button></div>'+
    renderCalendarHTML()+renderBookingList();

function renderCalendarHTML(){
  var mNames=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  var dNames=['أح','إث','ثل','أر','خم','جم','سب'];
  var today=new Date();var fd=new Date(_calYear,_calMonth,1).getDay();var dim=new Date(_calYear,_calMonth+1,0).getDate();var dip=new Date(_calYear,_calMonth,0).getDate();
  var bd={};BOOKINGS.forEach(function(b){var d=new Date(b.date);if(!isNaN(d.getTime())&&d.getFullYear()===_calYear&&d.getMonth()===_calMonth)bd[d.getDate()]=true;});
  var html='<div class="card"><div class="cal-header"><button class="btn btn-sm btn-ghost" style="flex:0;padding:5px 9px" onclick="calPrev()">‹</button><div class="cal-title">'+mNames[_calMonth]+' '+_calYear+'</div><button class="btn btn-sm btn-ghost" style="flex:0;padding:5px 9px" onclick="calNext()">›</button></div>'+
    '<div class="cal-grid">'+dNames.map(function(d){return '<div class="cal-day-name">'+d+'</div>';}).join('');
  for(var i=fd-1;i>=0;i--)html+='<div class="cal-day other-month">'+(dip-i)+'</div>';
  for(var d=1;d<=dim;d++){
    var iT=d===today.getDate()&&_calMonth===today.getMonth()&&_calYear===today.getFullYear();
    html+='<div class="cal-day'+(iT?' today':'')+(bd[d]?' has-booking':'')+(_calSel===d?' selected':'')+'" onclick="calSel('+d+')">'+d+'</div>';
  }
  return html+'</div></div>';
}
function calPrev(){_calMonth--;if(_calMonth<0){_calMonth=11;_calYear--;}renderBookings();}
function calNext(){_calMonth++;if(_calMonth>11){_calMonth=0;_calYear++;}renderBookings();}
function calSel(d){_calSel=d;renderBookings();}
function renderBookingList(){
  var filtered=_calSel?BOOKINGS.filter(function(b){var bd=new Date(b.date);return!isNaN(bd.getTime())&&bd.getDate()===_calSel&&bd.getMonth()===_calMonth&&bd.getFullYear()===_calYear;}):BOOKINGS;
  if(!filtered.length)return'<div class="empty"><div class="empty-ic">📅</div><div class="empty-txt">'+(_calSel?'لا حجوزات هذا اليوم':'لا توجد حجوزات')+'</div></div>';
  return filtered.map(function(b){
    var dev=DEVICES.find(function(d){return d.id===b.deviceId;})||{name:'؟',icon:'🎮'};
    return '<div class="booking-item"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">'+
      '<div><div style="font-weight:700;font-size:13px;color:#fff">👤 '+esc(b.customer)+'</div><div style="font-size:10px;color:var(--yellow);margin-top:2px">⏰ '+b.date+' — '+b.time+'</div></div>'+
      '<span class="badge '+(b.status==='confirmed'?'badge-live':'badge-paused')+'">'+(b.status==='confirmed'?'✅ مؤكد':'⏳ انتظار')+'</span></div>'+
      '<div style="font-size:10px;color:var(--muted)">'+dev.icon+' '+esc(dev.name)+(b.game?' · 🎮 '+esc(b.game):'')+'</div>'+
      '<div class="btn-row" style="margin-top:8px">'+(b.status==='pending'?'<button class="btn btn-green" onclick="confirmBook('+b.id+')">✅ تأكيد</button>':'')+
      '<button class="btn btn-ghost" onclick="deleteBook('+b.id+')">🗑 حذف</button></div></div>';
  }).join('');
}

function confirmAddBooking(){
  var customer=(document.getElementById('bk-nm').value||'').trim();var deviceId=parseInt(document.getElementById('bk-dev').value);
  var date=document.getElementById('bk-dt').value;var time=document.getElementById('bk-tm').value;var game=(document.getElementById('bk-gm').value||'').trim();

function deleteBook(id){BOOKINGS=BOOKINGS.filter(function(b){return b.id!==id;});SS('gb5_book',BOOKINGS);renderBookings();}

function renderBookingsInner(){var el=document.getElementById('bookings-inner');if(el){el.innerHTML='<div class="sec-head"><div class="sec-title">الحجوزات</div><button class="add-btn" style="background:linear-gradient(135deg,var(--yellow),#d97706)" onclick="openAddBooking()">+ حجز</button></div>'+renderCalendarHTML()+renderBookingList();}}
// ══ CUSTOMERS PAGE ══
function renderCustomers(){
  var el=document.getElementById('page-customers');
  var profiles={};
  HISTORY.forEach(function(h){
    if(!h.customer||h.customer==='زائر')return;
    if(!profiles[h.customer])profiles[h.customer]={name:h.customer,sessions:0,totalTime:0,totalSpent:0,lastVisit:'',favGame:'',games:{},ratings:[],firstVisit:h.date};
    var p=profiles[h.customer];
    p.sessions++;p.totalTime+=(h.elapsed||0);p.totalSpent+=parseFloat(h.cost);p.lastVisit=h.date;

// ── BIRTHDAY ENGINE ──
function getTodayBirthdays(){
  var today=new Date();var d=today.getDate();var m=today.getMonth()+1;
  return Object.entries(BIRTHDAYS).filter(function(e){return e[1].day===d&&e[1].month===m;}).map(function(e){return e[0];});
}
function getUpcomingBirthdays(days){
  var today=new Date();var upcoming=[];
  Object.entries(BIRTHDAYS).forEach(function(e){
    var b=e[1];if(!b.day||!b.month)return;
    var bday=new Date(today.getFullYear(),b.month-1,b.day);
    if(bday<today)bday=new Date(today.getFullYear()+1,b.month-1,b.day);
    var diff=Math.ceil((bday-today)/(1000*60*60*24));
    if(diff<=days)upcoming.push({name:e[0],day:b.day,month:b.month,year:b.year,phone:b.phone,diff:diff});
  });
  return upcoming.sort(function(a,b){return a.diff-b.diff;});
}
function buildBdayWAMsg(name){
  var b=BIRTHDAYS[name]||{};
  var age='';if(b.year){var today=new Date();age=' ('+(today.getFullYear()-b.year)+' سنة)';}
  return 'عيد ميلاد سعيد '+name+'! 🎂🎉\n'+
    'من فريق '+SETTINGS.shopName+' نتمنى لك عاماً مليئاً بالسعادة والصحة'+age+' 🎮\n'+
    'في انتظارك عندنا بمناسبة عيد ميلادك ✨';
}
function sendBdayWA(name){
  var b=BIRTHDAYS[name]||{};
  if(!b.phone){toast('لا يوجد رقم هاتف لـ '+name,'red');return;}
  var msg=buildBdayWAMsg(name);
  window.open('https://wa.me/'+b.phone+'?text='+encodeURIComponent(msg),'_blank');
  toast('💬 تم فتح واتساب لـ '+name);
}

// ── MONTHLY COMPARISON ──
function renderMonthlyComparison(){
  var months=[];var today=new Date();
  for(var i=5;i>=0;i--){
    var d=new Date(today.getFullYear(),today.getMonth()-i,1);
    var mStr=(d.getMonth()+1)+'/'+d.getFullYear();
    var mH=HISTORY.filter(function(h){return h.month===mStr;});
    var rev=mH.reduce(function(s,h){return s+parseFloat(h.cost);},0);
    var mNames=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
    months.push({label:mNames[d.getMonth()].slice(0,3),mStr:mStr,rev:rev,cnt:mH.length});
  }
  var maxRev=Math.max.apply(null,months.map(function(m){return m.rev;}))||1;
  var html='<div class="chart-wrap" style="margin-bottom:0"><div class="chart-title">📊 مقارنة آخر 6 أشهر</div>';
  var prevRev=null;
  months.forEach(function(m,i){
    var pct=Math.max(5,(m.rev/maxRev)*100);
    var color=m.rev>=(prevRev||0)?'linear-gradient(90deg,var(--green),#059669)':'linear-gradient(90deg,var(--red),#dc2626)';
    var arrow=prevRev===null?'':m.rev>prevRev?'<span style="color:var(--green)">▲</span>':m.rev<prevRev?'<span style="color:var(--red)">▼</span>':'<span style="color:var(--muted)">—</span>';
    var isCurrent=(months[i].mStr===((today.getMonth()+1)+'/'+today.getFullYear()));
    html+='<div class="comp-row">'+
      '<div class="comp-month" style="'+(isCurrent?'color:var(--blue)':'')+'">'+m.label+(isCurrent?' *':'')+'</div>'+
      '<div style="flex:1"><div class="comp-bar" style="width:'+pct+'%;background:'+color+'">'+m.cnt+'</div></div>'+
      '<div class="comp-val">'+m.rev.toFixed(0)+'ج</div>'+
      '<div class="comp-arrow">'+arrow+'</div>'+
    '</div>';
    prevRev=m.rev;
  });
  // Growth summary
  var first=months[0].rev,last=months[months.length-1].rev;
  var growth=first>0?((last-first)/first*100).toFixed(1):0;
  var bestMonth=months.reduce(function(a,b){return b.rev>a.rev?b:a;},months[0]);
  html+='<div style="margin-top:12px;display:flex;gap:8px">'+
    '<div style="flex:1;background:var(--bg3);border-radius:9px;padding:9px;text-align:center">'+
      '<div style="font-size:9px;color:var(--muted)">أفضل شهر</div>'+
      '<div style="font-size:12px;font-weight:700;color:var(--yellow)">'+bestMonth.label+'</div>'+
      '<div style="font-family:Orbitron;font-size:11px;color:var(--green)">'+bestMonth.rev.toFixed(0)+' ج</div>'+
    '</div>'+
    '<div style="flex:1;background:var(--bg3);border-radius:9px;padding:9px;text-align:center">'+
      '<div style="font-size:9px;color:var(--muted)">النمو (6 أشهر)</div>'+
      '<div style="font-family:Orbitron;font-size:14px;color:'+(parseFloat(growth)>=0?'var(--green)':'var(--red)')+';font-weight:900">'+(parseFloat(growth)>=0?'+':'')+growth+'%</div>'+
    '</div>'+
  '</div>';
  html+='</div>';
  return html;
}
