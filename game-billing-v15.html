function saveFirebaseCfg(){
  FIREBASE_CFG.apiKey=document.getElementById('fb-key').value.trim();
  FIREBASE_CFG.projectId=document.getElementById('fb-proj').value.trim();
  FIREBASE_CFG.enabled=!!(FIREBASE_CFG.apiKey&&FIREBASE_CFG.projectId);
  SS('gbf_fbcfg',FIREBASE_CFG);swMoreTab('cloudsync');
  toast(FIREBASE_CFG.enabled?'✅ تم حفظ إعدادات Firebase':'⚠️ أدخل API Key و Project ID أولاً','yellow');
}
function syncToCloud(){
  if(!FIREBASE_CFG.enabled){toast('أعدّ Firebase أولاً','red');return;}
  var payload={devices:DEVICES,history:HISTORY.slice(0,500),customers:CUSTOMERS,loyalty:LOYALTY,settings:{shopName:SETTINGS.shopName},ts:Date.now()};
  var url='https://'+FIREBASE_CFG.projectId+'-default-rtdb.firebaseio.com/gbp.json?auth='+FIREBASE_CFG.apiKey;
  fetch(url,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
    .then(function(r){
      if(r.ok){SETTINGS.lastSync=new Date().toLocaleString('ar-EG');SS('gb5_set',SETTINGS);toast('✅ تمت المزامنة السحابية!');}
      else toast('❌ خطأ في المزامنة ('+r.status+')','red');
    }).catch(function(){
      // offline fallback: export JSON
      var blob=new Blob([JSON.stringify(payload)],{type:'application/json'});
      var a=document.createElement('a');a.href=URL.createObjectURL(blob);
      a.download='gbp-backup-'+todayStr().replace(/\//g,'-')+'.json';a.click();
      toast('📥 تم حفظ نسخة محلية (تحقق الاتصال)','yellow');
    });
}
function restoreFromCloud(){
  if(!FIREBASE_CFG.enabled){toast('أعدّ Firebase أولاً','red');return;}
  fetch('https://'+FIREBASE_CFG.projectId+'-default-rtdb.firebaseio.com/gbp.json?auth='+FIREBASE_CFG.apiKey)
    .then(function(r){return r.json();}).then(function(d){
      if(!d){toast('لا توجد بيانات في السحابة','red');return;}
      if(d.devices){DEVICES=d.devices;SS('gb5_dev',DEVICES);}
      if(d.history){HISTORY=d.history;SS('gb5_hist',HISTORY);}
      if(d.customers){CUSTOMERS=d.customers;SS('gb5_cust',CUSTOMERS);}
      if(d.loyalty){LOYALTY=d.loyalty;SS('gb5_loy',LOYALTY);}
      updateHeader();renderTab(CUR_TAB);
      toast('✅ تمت الاستعادة من السحابة!');
    }).catch(function(){toast('❌ تعذّر الاتصال بالسحابة','red');});
}

var _origStopSessBase=stopSess;
stopSess=function(did,print){
  var s=SESSIONS[did];var dev=DEVICES.find(function(d){return d.id===parseInt(did);});
  _origStopSessBase(did,print);
  // Audit
  if(dev&&s)addAuditLog('إنهاء جلسة',esc(dev.name)+' — '+(s.customer||'زائر'));
  // Streak
  if(s&&s.customer&&s.customer!=='زائر'){
    var cn=s.customer;if(!STREAKS[cn])STREAKS[cn]={count:0,lastDate:''};
    var td=todayStr();
    if(STREAKS[cn].lastDate!==td){
      var last=STREAKS[cn].lastDate;
      if(last){var lp=last.split('/'),tp=td.split('/');
        var d1=new Date(lp[2]+'-'+lp[1]+'-'+lp[0]),d2=new Date(tp[2]+'-'+tp[1]+'-'+tp[0]);
        var df=Math.round((d2-d1)/86400000);STREAKS[cn].count=df<=1?STREAKS[cn].count+1:1;
      }else STREAKS[cn].count=1;
      STREAKS[cn].lastDate=td;SS('gb5_streaks',STREAKS);
      if(STREAKS[cn].count>0&&STREAKS[cn].count%5===0){toast('🔥 '+cn+' — '+STREAKS[cn].count+' زيارة!','yellow');smartNotify('streak','🔥 سلسلة انتظام',cn+' — '+STREAKS[cn].count+' زيارة متتالية');}
    }
  }
  // Auto WA Invoice
  if(SETTINGS.autoWAInvoice&&s&&s.customer&&s.customer!=='زائر'){
    var phone=CUST_PHONES[s.customer];
    var rec=HISTORY[0];
    if(phone&&rec){
      var msg=buildWAMsg(rec,dev);var num=phone.replace(/\D/g,'');
      setTimeout(function(){
        if(confirm('📲 إرسال فاتورة واتساب لـ '+s.customer+'؟')){
          window.open('https://wa.me/'+num+'?text='+encodeURIComponent(msg),'_blank');
          SETTINGS.wasentToday=(SETTINGS.wasentToday||0)+1;SS('gb5_set',SETTINGS);
        }
      },600);
    }
  }
  // Goal confetti
  setTimeout(checkGoalConfetti,400);
  // Cashier log
  if(rec){CASHIER_HISTORY.unshift({type:'pay',note:'جلسة '+esc((s&&s.customer)||'زائر')+' — '+(dev?dev.name:''),amount:parseFloat((HISTORY[0]||{cost:0}).cost)||0,ts:new Date().toLocaleString('ar-EG')});if(CASHIER_HISTORY.length>300)CASHIER_HISTORY=CASHIER_HISTORY.slice(0,300);SS('gbf_cashh',CASHIER_HISTORY);}
};

function connectBT(){
  if(!navigator.bluetooth){toast('المتصفح لا يدعم بلوتوث — جرب Chrome','red');return;}
  navigator.bluetooth.requestDevice({acceptAllDevices:true,optionalServices:['000018f0-0000-1000-8000-00805f9b34fb','0000ff00-0000-1000-8000-00805f9b34fb']})
    .then(function(d){_btDevice=d;return d.gatt.connect();})
    .then(function(s){return s.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb').catch(function(){return s.getPrimaryService('0000ff00-0000-1000-8000-00805f9b34fb');});})
    .then(function(sv){return sv.getCharacteristics();})
    .then(function(chars){_btChar=chars[0];SETTINGS.btConnected=true;SS('gb5_set',SETTINGS);swMoreTab('btprinter');toast('✅ الطابعة متصلة!');})
    .catch(function(e){toast('تعذّر الاتصال: '+e.message,'red');});
}
function disconnectBT(){if(_btDevice&&_btDevice.gatt.connected)_btDevice.gatt.disconnect();_btDevice=null;_btChar=null;SETTINGS.btConnected=false;SS('gb5_set',SETTINGS);swMoreTab('btprinter');toast('🔌 تم قطع الاتصال','yellow');}
function sendToBT(text){
  if(!_btChar){toast('الطابعة غير متصلة','red');return;}
  var enc=new TextEncoder();var data=enc.encode('\x1b\x40'+text+'\x1d\x56\x41\x10');
  _btChar.writeValue(data).then(function(){toast('✅ تمت الطباعة');}).catch(function(e){toast('خطأ: '+e,'red');});
}
function testPrint(){sendToBT('\n   '+SETTINGS.shopName+'\n   ================\n   طباعة تجريبية ✓\n   '+todayStr()+'\n\n\n');}
function printReceipt(rec){
  var text='\n'+SETTINGS.shopName+'\n'+(SETTINGS.shopAddress||'')+'\n================\nالعميل: '+rec.customer+'\nالجهاز: '+rec.device+'\nالمدة: '+rec.duration+'\nالإجمالي: '+rec.cost+' ج\n================\n'+rec.date+' '+rec.time+'\n\n\n';
  if(_btChar)sendToBT(text);else openPrintWindow(rec);
}

function renderElecHTML(){
  var rate=ELEC_LOG.rate||1.5;var devs=DEVICES.length;var hoursToday=HISTORY.filter(function(h){return h.date===todayStr();}).reduce(function(s,h){return s+parseFloat(h.elapsed||0)/60;},0);

  '<div class="card">'+
    '<div class="form-group"><label class="form-label">سعر الكيلوواط/ساعة</label><input id="elec-r" type="number" step="0.1" value="'+rate+'" dir="ltr"/></div>'+

function calcElec(){
  var rate=parseFloat(document.getElementById('elec-r').value)||1.5;
  var kw=parseFloat(document.getElementById('elec-kw').value)||0.2;
  ELEC_LOG.rate=rate;ELEC_LOG.kwPerDevice=kw;SS('gbf_elec',ELEC_LOG);
  var sessions=HISTORY.filter(function(h){return h.date===todayStr();});
  var hours=sessions.reduce(function(s,h){return s+parseFloat(h.elapsed||0)/60;},0);
  var cost=hours*DEVICES.length*kw*rate;
  var rev=sessions.reduce(function(s,h){return s+parseFloat(h.cost)||0;},0);
  var el=document.getElementById('elec-result');
  if(el)el.innerHTML='<div style="background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.2);border-radius:14px;padding:14px">'+
    '<div style="font-size:12px;font-weight:700;color:#fff;margin-bottom:9px">📊 تقرير اليوم</div>'+
    '<div style="display:flex;flex-direction:column;gap:6px;font-size:12px">'+
      '<div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">الإيرادات</span><span style="color:var(--green);font-weight:700">'+rev.toFixed(2)+' ج</span></div>'+
      '<div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">تكلفة الكهرباء</span><span style="color:var(--red);font-weight:700">'+cost.toFixed(2)+' ج</span></div>'+
      '<div style="border-top:1px solid var(--border);padding-top:6px;display:flex;justify-content:space-between"><span style="color:#fff;font-weight:700">الربح الصافي</span><span style="font-family:Orbitron;font-size:15px;color:'+(rev-cost>0?'var(--green)':'var(--red)')+'">'+(rev-cost).toFixed(2)+' ج</span></div>'+
    '</div>'+
  '</div>';
  toast('✅ تم الحساب');
}

// ── URL Portal Detection ──────────────────────────────────────────────
function checkPortalURL() {
  var hash = window.location.hash || '';
  var search = window.location.search || '';
  // Support #portal=NAME or ?portal=NAME or #c=NAME
  var name = '';
  var m = hash.match(/[#&]portal=([^&]+)/) || hash.match(/[#&]c=([^&]+)/);
  if (m) name = decodeURIComponent(m[1]);
  if (!name) {
    var sp = new URLSearchParams(search);
    name = sp.get('portal') || sp.get('c') || '';
  }
  if (name) {
    openCustomerPortal(name);
    return true;
  }
  return false;
}

// ── Open Portal ───────────────────────────────────────────────────────
function openCustomerPortal(customerName) {
  _portalCustomer = customerName || 'زائر';
  var portal = document.getElementById('customer-portal');
  if (!portal) return;
  // Hide main app
  var app = document.getElementById('main-app');
  var lock = document.getElementById('lock-screen');
  var splash = document.getElementById('splash-screen');
  if (app) app.style.display = 'none';
  if (lock) lock.style.display = 'none';
  if (splash) splash.style.display = 'none';
  portal.style.display = 'block';
  renderPortal();
}

function closeCustomerPortal() {
  var portal = document.getElementById('customer-portal');
  if (portal) portal.style.display = 'none';
  var app = document.getElementById('main-app');
  if (app) { app.style.display = 'block'; app.style.opacity = '1'; }
  _portalCustomer = null;
  // Clean URL
  if (window.history && window.history.replaceState) {
    window.history.replaceState(null, '', window.location.pathname);
  }
}

      '</div>' +

        '<div style="font-size:11px;color:var(--blue);margin-top:8px">🎮 ' + esc(SETTINGS.shopName || 'Game Billing Pro') + '</div>' +
        (SETTINGS.shopPhone ?
          '<button onclick="window.open(\'https://wa.me/' + (SETTINGS.shopPhone || '').replace(/\D/g, '') + '\',\'_blank\')" style="margin-top:10px;width:100%;padding:10px;border-radius:12px;border:none;background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.25);color:#25d366;font-family:Cairo;font-size:12px;font-weight:700;cursor:pointer">💬 تواصل عبر واتساب</button>' : '') +
      '</div>' +

    '</div>'; // end padding div

  // Generate customer QR code
  setTimeout(function() {
    var qrEl = document.getElementById('portal-qr');
    if (qrEl && window.QRCode) {
      qrEl.innerHTML = '';
      var portalURL = window.location.origin + window.location.pathname + '#portal=' + encodeURIComponent(name);
      new QRCode(qrEl, { text: portalURL, width: 140, height: 140, colorDark: '#000', colorLight: '#fff' });
    }
  }, 100);

  // Live cost update for active session
  if (activeSess) {
    var portalLiveInterval = setInterval(function() {
      var costEl = document.getElementById('portal-live-cost');
      if (!costEl || !document.getElementById('customer-portal') || document.getElementById('customer-portal').style.display === 'none') {
        clearInterval(portalLiveInterval);
        return;
      }
      // Find device for this session
      var did = Object.keys(SESSIONS).find(function(d) { return SESSIONS[d].customer === name; });
      if (did) {
        var dev = DEVICES.find(function(d) { return d.id === parseInt(did); });
        if (dev) {
          var cost = calcCost(getElapsed(parseInt(did)), dev.rate, SESSIONS[did].discount);
          costEl.textContent = cost.toFixed(2) + ' ج';
        }
      } else {
        clearInterval(portalLiveInterval);
        renderPortal(); // re-render to show session ended
      }
    }, 1000);
  }
}

// ── Portal UI Helpers ─────────────────────────────────────────────────
function portalKPI(label, val, color) {
  return '<div style="background:rgba(0,0,0,.2);border-radius:12px;padding:10px;text-align:center">' +
    '<div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">' + label + '</div>' +
    '<div style="font-family:Orbitron;font-size:20px;font-weight:900;color:' + color + ';line-height:1">' + val + '</div>' +
  '</div>';
}

function portalAction(icon, label, color, onclick) {
  var colors = {
    blue: { bg: 'rgba(56,189,248,.1)', border: 'rgba(56,189,248,.25)', text: '#38bdf8' },
    yellow: { bg: 'rgba(251,191,36,.1)', border: 'rgba(251,191,36,.25)', text: '#fbbf24' },
    green: { bg: 'rgba(52,211,153,.1)', border: 'rgba(52,211,153,.25)', text: '#34d399' },
    pink: { bg: 'rgba(244,114,182,.1)', border: 'rgba(244,114,182,.25)', text: '#f472b6' },
    purple: { bg: 'rgba(167,139,250,.1)', border: 'rgba(167,139,250,.25)', text: '#a78bfa' },
  };
  var c = colors[color] || colors.blue;
  return '<button onclick="' + onclick + '" style="background:' + c.bg + ';border:1px solid ' + c.border + ';border-radius:16px;padding:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:7px;transition:.15s;width:100%">' +
    '<span style="font-size:28px">' + icon + '</span>' +
    '<span style="font-family:Cairo;font-size:12px;font-weight:700;color:' + c.text + '">' + label + '</span>' +
  '</button>';
}

// ── Portal Actions ────────────────────────────────────────────────────
function openPortalBooking() {
  var devOpts = DEVICES.map(function(d) {
    return '<option value="' + d.id + '">' + esc(d.icon + ' ' + d.name) + ' — ' + d.rate + ' ج/ساعة</option>';
  }).join('');

  var tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
  var minDate = tomorrow.toISOString().split('T')[0];

  showPortalModal(
    '📅 حجز جلسة',
    '<div class="form-group"><label class="form-label">التاريخ</label><input id="pb-date" type="date" min="' + minDate + '" dir="ltr"/></div>' +
    '<div class="form-group"><label class="form-label">الوقت</label><input id="pb-time" type="time" dir="ltr" value="18:00"/></div>' +
    '<div class="form-group"><label class="form-label">الجهاز</label><select id="pb-dev"><option value="">أي جهاز متاح</option>' + devOpts + '</select></div>' +
    '<div class="form-group"><label class="form-label">ملاحظات</label><input id="pb-note" placeholder="رقم هاتفك للتأكيد..."/></div>',
    '<button onclick="confirmPortalBooking()" class="btn btn-blue" style="width:100%;padding:13px;font-size:14px">📅 تأكيد الحجز</button>'
  );
}

function confirmPortalBooking() {
  var date = (document.getElementById('pb-date') || {}).value;
  var time = (document.getElementById('pb-time') || {}).value;
  var devId = (document.getElementById('pb-dev') || {}).value;
  var note = (document.getElementById('pb-note') || {}).value;
  if (!date || !time) { portalToast('اختر التاريخ والوقت'); return; }

  var dev = devId ? DEVICES.find(function(d) { return d.id == devId; }) : null;
  var booking = {
    id: Date.now(),
    customer: _portalCustomer,
    date: date,
    time: time,
    deviceId: devId ? parseInt(devId) : null,
    device: dev ? dev.name : 'أي جهاز',
    notes: note,
    status: 'pending',
    source: 'portal'
  };
  BOOKINGS.push(booking);
  SS('gb5_book', BOOKINGS);

  // Add portal request
  PORTAL_REQUESTS.push({ id: Date.now() + 1, customer: _portalCustomer, type: 'booking', data: booking, ts: new Date().toLocaleString('ar-EG'), status: 'pending' });
  SS('gbf_preq', PORTAL_REQUESTS);

  // Notify shop
  sendNotif('📅 حجز جديد من البوابة', _portalCustomer + ' — ' + date + ' ' + time);
  closePortalModal();
  portalToast('✅ تم إرسال طلب الحجز!');
  renderPortal();
}

function openPortalRedeem() {
  var loy = LOYALTY[_portalCustomer] || { pts: 0 };
  if (!loy.pts) { portalToast('ليس لديك نقاط كافية'); return; }

  if (!POINTS_CATALOG || !POINTS_CATALOG.length) {
    showPortalModal('💎 استرداد النقاط',
      '<div style="text-align:center;padding:20px">' +
        '<div style="font-family:Orbitron;font-size:40px;color:var(--yellow);margin-bottom:10px">' + loy.pts + '</div>' +
        '<div style="font-size:13px;color:var(--muted)">نقطة متاحة</div>' +
        '<div style="font-size:11px;color:var(--muted);margin-top:10px">' + (SETTINGS.loyaltyRedeem || 100) + ' نقطة = جلسة مجانية</div>' +
        '<div style="font-size:11px;color:var(--muted);margin-top:5px">أظهر هذه الشاشة للموظف</div>' +
      '</div>',
      '<button onclick="closePortalModal()" class="btn btn-ghost" style="width:100%">إغلاق</button>'
    );
    return;
  }

  var rows = POINTS_CATALOG.map(function(r) {
    var can = loy.pts >= r.points;
    return '<div style="background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px">' +
      '<span style="font-size:26px">' + r.icon + '</span>' +
      '<div style="flex:1"><div style="font-size:12px;font-weight:700;color:#fff">' + esc(r.name) + '</div>' +
        '<div style="font-size:10px;color:var(--yellow)">' + r.points + ' نقطة</div>' +
      '</div>' +
      '<button onclick="portalRedeemItem(\'' + r.id + '\')" style="background:' + (can ? 'var(--yellow)' : 'rgba(255,255,255,.06)') + ';border:none;border-radius:9px;padding:7px 13px;font-family:Cairo;font-size:11px;font-weight:700;color:' + (can ? '#000' : 'var(--muted)') + ';cursor:' + (can ? 'pointer' : 'not-allowed') + '">' + (can ? 'استرداد' : 'غير كافٍ') + '</button>' +
    '</div>';
  }).join('');

  showPortalModal('💎 استرداد النقاط (' + loy.pts + ' نقطة)', rows,
    '<button onclick="closePortalModal()" class="btn btn-ghost" style="width:100%">إغلاق</button>'
  );
}

function portalRedeemItem(rewardId) {
  var r = (POINTS_CATALOG || []).find(function(x) { return x.id === rewardId; });
  if (!r) return;
  var loy = LOYALTY[_portalCustomer];
  if (!loy || loy.pts < r.points) { portalToast('نقاطك غير كافية'); return; }
  loy.pts -= r.points;
  SS('gb5_loy', LOYALTY);
  PORTAL_REQUESTS.push({ id: Date.now(), customer: _portalCustomer, type: 'redeem', data: r, ts: new Date().toLocaleString('ar-EG'), status: 'pending' });
  SS('gbf_preq', PORTAL_REQUESTS);
  sendNotif('💎 استرداد نقاط', _portalCustomer + ' استرد: ' + r.name);
  closePortalModal();
  launchPortalConfetti();
  portalToast('🎉 تم! أظهر هذه الرسالة للموظف');
  renderPortal();
}

function openPortalRate() {
  var sessions = HISTORY.filter(function(h) { return h.customer === _portalCustomer; });
  var last = sessions[0];
  if (!last) { portalToast('لا توجد جلسة سابقة للتقييم'); return; }
  if (last.rating) { portalToast('قيّمت هذه الجلسة مسبقاً (' + '⭐'.repeat(last.rating) + ')'); return; }
  _portalRating = 0;

  showPortalModal('⭐ قيّم جلستك',
    '<div style="text-align:center;padding:10px 0">' +
      '<div style="font-size:12px;color:var(--muted);margin-bottom:14px">' + esc(last.device) + ' — ' + esc(last.date) + ' — ' + parseFloat(last.cost).toFixed(0) + ' ج</div>' +
      '<div style="font-size:13px;color:#fff;font-weight:700;margin-bottom:14px">كيف كانت تجربتك؟</div>' +
      '<div id="portal-stars" style="display:flex;gap:10px;justify-content:center;margin-bottom:16px">' +
        [1,2,3,4,5].map(function(n) {
          return '<button onclick="setPortalRating(' + n + ')" id="pstar-' + n + '" style="font-size:36px;background:none;border:none;cursor:pointer;transition:.2s;filter:grayscale(1);opacity:.4">⭐</button>';
        }).join('') +
      '</div>' +
      '<textarea id="portal-review" placeholder="اكتب تقييمك (اختياري)..." rows="3" style="resize:none;width:100%;border-radius:12px;padding:11px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#fff;font-family:Cairo;font-size:12px;outline:none"></textarea>' +
    '</div>',
    '<button onclick="submitPortalRating(\'' + last.id + '\')" class="btn btn-yellow" style="width:100%;padding:13px">إرسال التقييم ⭐</button>'
  );
}

function setPortalRating(n) {
  _portalRating = n;
  for (var i = 1; i <= 5; i++) {
    var el = document.getElementById('pstar-' + i);
    if (el) { el.style.filter = i <= n ? 'none' : 'grayscale(1)'; el.style.opacity = i <= n ? '1' : '.4'; el.style.transform = i <= n ? 'scale(1.2)' : 'scale(1)'; }
  }
}

function submitPortalRating(sessId) {
  if (!_portalRating) { portalToast('اختر عدد النجوم أولاً'); return; }
  var review = (document.getElementById('portal-review') || {}).value || '';
  HISTORY = HISTORY.map(function(h) {
    if (h.id === sessId || h.id === parseInt(sessId)) return Object.assign({}, h, { rating: _portalRating, review: review });
    return h;
  });
  SS('gb5_hist', HISTORY);
  closePortalModal();
  if (_portalRating >= 4) launchPortalConfetti();
  portalToast(_portalRating >= 4 ? '🌟 شكراً! سعداء برأيك الإيجابي' : '✅ شكراً على تقييمك — سنحسّن تجربتك');
  renderPortal();
}

      '<button onclick="openPortalComplaint()" style="display:flex;align-items:center;gap:12px;background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.15);border-radius:13px;padding:14px;cursor:pointer;font-family:Cairo;font-size:13px;font-weight:700;color:var(--red);width:100%"><span style="font-size:22px">📝</span>تقديم شكوى</button>' +

  showPortalModal('📝 تقديم شكوى أو اقتراح',
    '<div class="form-group"><label class="form-label">الموضوع</label><select id="pc-type"><option value="شكوى">شكوى</option><option value="اقتراح">اقتراح</option><option value="استفسار">استفسار</option></select></div>' +
    '<div class="form-group"><label class="form-label">التفاصيل</label><textarea id="pc-text" rows="4" placeholder="اكتب هنا..." style="resize:none"></textarea></div>',
    '<button onclick="submitPortalComplaint()" class="btn btn-red" style="width:100%;padding:13px">إرسال</button>'
  );
}

function submitPortalComplaint() {
  var type = (document.getElementById('pc-type') || {}).value || 'شكوى';
  var text = (document.getElementById('pc-text') || {}).value || '';
  if (!text.trim()) { portalToast('اكتب التفاصيل'); return; }
  PORTAL_REQUESTS.push({ id: Date.now(), customer: _portalCustomer, type: type, data: text, ts: new Date().toLocaleString('ar-EG'), status: 'pending' });
  SS('gbf_preq', PORTAL_REQUESTS);
  sendNotif('📝 ' + type + ' جديدة', _portalCustomer + ': ' + text.slice(0, 50));
  closePortalModal();
  portalToast('✅ تم إرسال ' + type + ' — سنتواصل معك');
}

// ── Portal Modal ──────────────────────────────────────────────────────
function showPortalModal(title, body, footer) {
  var existing = document.getElementById('portal-modal');
  if (existing) existing.remove();
  var div = document.createElement('div');
  div.id = 'portal-modal';
  div.style.cssText = 'position:fixed;inset:0;z-index:10001;background:rgba(0,0,8,.8);backdrop-filter:blur(14px);display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s ease';
  div.innerHTML =
    '<div style="background:linear-gradient(170deg,rgba(10,18,38,.99),rgba(6,12,26,.99));border:1px solid rgba(255,255,255,.12);border-bottom:none;border-radius:28px 28px 0 0;padding:20px 16px 40px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s cubic-bezier(.34,1.1,.64,1)">' +
      '<div style="width:32px;height:3px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 18px"></div>' +
      '<div style="font-family:Orbitron;font-size:13px;font-weight:700;background:linear-gradient(90deg,#fff,rgba(255,255,255,.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px;letter-spacing:1px">' + title + '</div>' +
      body +
      '<div style="margin-top:14px">' + (footer || '') + '</div>' +
    '</div>';
  div.onclick = function(e) { if (e.target === div) closePortalModal(); };
  document.body.appendChild(div);
}

function closePortalModal() {
  var m = document.getElementById('portal-modal');
  if (m) m.remove();
}

function portalToast(msg) {
  var div = document.createElement('div');
  div.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10002;background:rgba(10,18,38,.95);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:12px 22px;color:#fff;font-family:Cairo;font-size:13px;font-weight:700;white-space:nowrap;backdrop-filter:blur(20px);animation:toastIn .3s ease';
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(function() { if (div.parentNode) div.remove(); }, 2800);
}

function launchPortalConfetti() {
  var colors = ['#38bdf8','#34d399','#fbbf24','#f472b6','#a78bfa'];
  for (var i = 0; i < 25; i++) {
    (function(delay, color, x) {
      setTimeout(function() {
        var el = document.createElement('div');
        el.style.cssText = 'position:fixed;z-index:10003;left:' + x + 'vw;top:50vh;width:7px;height:7px;background:' + color + ';border-radius:50%;pointer-events:none;animation:confettiDrop 1.1s ease forwards';
        document.body.appendChild(el);
        setTimeout(function() { if (el.parentNode) el.remove(); }, 1200);
      }, delay);
    })(i * 50, colors[i % colors.length], 10 + Math.random() * 80);
  }
}

// ── Generate Customer QR Code (for staff) ────────────────────────────
function openCustomerQR(customerName) {
  var url = window.location.origin + window.location.pathname + '#portal=' + encodeURIComponent(customerName);
  openModal(
    '<div class="modal-title">📱 رابط العميل — ' + esc(customerName) + '</div>' +
    '<div style="text-align:center;padding:16px">' +
      '<div id="cust-qr-box" style="display:inline-block;background:#fff;padding:14px;border-radius:18px;margin-bottom:14px"></div>' +
      '<div style="font-size:11px;color:var(--muted);margin-bottom:10px">العميل يمسح الكود لفتح ملفه الشخصي</div>' +
      '<div style="font-size:10px;color:var(--blue);direction:ltr;word-break:break-all;padding:8px;background:rgba(56,189,248,.06);border-radius:10px">' + esc(url) + '</div>' +
    '</div>' +
    '<div class="btn-row">' +
      '<button class="btn btn-blue" onclick="navigator.clipboard&&navigator.clipboard.writeText(\'' + url + '\').then(function(){toast(\'📋 تم نسخ الرابط\')})">📋 نسخ الرابط</button>' +
      (CUST_PHONES[customerName] ?
        '<button class="btn btn-green" onclick="window.open(\'https://wa.me/' + (CUST_PHONES[customerName] || '').replace(/\\D/g, '') + '?text=' + encodeURIComponent('🎮 ملفك في ' + (SETTINGS.shopName || 'المحل') + '\n\n' + url) + '\',\'_blank\')">💬 إرسال واتساب</button>' : '') +
      '<button class="btn btn-ghost" onclick="closeModal()">إغلاق</button>' +
    '</div>'
  );
  setTimeout(function() {
    var box = document.getElementById('cust-qr-box');
    if (box && window.QRCode) {
      new QRCode(box, { text: url, width: 180, height: 180, colorDark: '#000', colorLight: '#fff' });
    }
  }, 100);
}

// ── Portal Requests Dashboard (for staff) ────────────────────────────

function renderCustomerConnectHTML(){return renderPortalRequestsHTML();}
function renderPortalRequestsHTML() {
  var pending = PORTAL_REQUESTS.filter(function(r) { return r.status === 'pending'; });
  return '<div class="sec-head"><div class="sec-title">📱 طلبات البوابة</div>' +
    (pending.length ? '<span style="background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.3);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;color:var(--red)">' + pending.length + ' جديد</span>' : '') +
  '</div>' +
  (PORTAL_REQUESTS.length ?
    '<div style="display:flex;flex-direction:column;gap:8px">' +
      PORTAL_REQUESTS.slice().reverse().slice(0, 30).map(function(req) {
        var typeLabels = { booking: '📅 حجز', redeem: '💎 استرداد', شكوى: '📝 شكوى', اقتراح: '💡 اقتراح', استفسار: '❓ استفسار' };
        var label = typeLabels[req.type] || req.type;
        var isPending = req.status === 'pending';
        return '<div style="background:' + (isPending ? 'rgba(56,189,248,.06)' : 'rgba(255,255,255,.03)') + ';border:1px solid ' + (isPending ? 'rgba(56,189,248,.25)' : 'var(--border)') + ';border-radius:13px;padding:12px">' +
          '<div style="display:flex;align-items:center;gap:9px;margin-bottom:6px">' +
            '<span style="font-size:18px">' + (label.split(' ')[0]) + '</span>' +
            '<div style="flex:1"><div style="font-size:12px;font-weight:700;color:#fff">' + esc(req.customer) + ' — ' + label + '</div>' +
              '<div style="font-size:9px;color:var(--muted)">' + esc(req.ts) + '</div>' +
            '</div>' +
            '<span style="font-size:9px;padding:3px 9px;border-radius:20px;border:1px solid;background:' + (isPending ? 'rgba(56,189,248,.1)' : 'rgba(52,211,153,.1)') + ';border-color:' + (isPending ? 'rgba(56,189,248,.3)' : 'rgba(52,211,153,.3)') + ';color:' + (isPending ? 'var(--blue)' : 'var(--green)') + '">' + (isPending ? 'جديد' : 'مكتمل') + '</span>' +
          '</div>' +
          (req.type === 'booking' && req.data ?
            '<div style="font-size:11px;color:var(--text2);margin-bottom:6px">' + esc(req.data.date || '') + ' ' + esc(req.data.time || '') + ' — ' + esc(req.data.device || 'أي جهاز') + '</div>' : '') +
          (typeof req.data === 'string' ?
            '<div style="font-size:11px;color:var(--text2);margin-bottom:6px">' + esc(req.data.slice(0, 100)) + '</div>' : '') +
          (isPending ?
            '<div class="btn-row">' +
              '<button onclick="completePortalReq(\'' + req.id + '\')" class="btn btn-green" style="font-size:10px;padding:8px">✓ تم</button>' +
              '<button onclick="openCustomerQR(\'' + esc(req.customer) + '\')" class="btn btn-blue" style="font-size:10px;padding:8px">📱 QR</button>' +
              '<button onclick="deletePortalReq(\'' + req.id + '\')" class="btn btn-ghost" style="font-size:10px;padding:8px">✕</button>' +
            '</div>' : '') +
        '</div>';
      }).join('') +
    '</div>' :
    '<div class="empty"><span class="empty-ic">📱</span><div class="empty-txt">لا توجد طلبات</div><div class="empty-sub">طلبات العملاء من البوابة ستظهر هنا</div></div>'
  ) +
  '<div style="margin-top:12px;padding:14px;background:rgba(56,189,248,.05);border:1px solid rgba(56,189,248,.15);border-radius:14px">' +
    '<div style="font-size:12px;font-weight:700;color:#fff;margin-bottom:8px">🔗 رابط البوابة العامة</div>' +
    '<div style="font-size:10px;color:var(--muted);margin-bottom:8px">شارك هذا الرابط مع عملائك ليفتحوا ملفاتهم الشخصية</div>' +
    '<div style="font-size:10px;color:var(--blue);background:rgba(56,189,248,.06);border-radius:9px;padding:8px;direction:ltr;word-break:break-all;margin-bottom:8px">' + (typeof window !== 'undefined' ? window.location.origin + window.location.pathname + '#portal=YOUR_NAME' : '#portal=YOUR_NAME') + '</div>' +
    '<button onclick="sharePortalLink()" class="btn btn-blue" style="width:100%">📤 مشاركة رابط البوابة</button>' +
  '</div>';
}

function completePortalReq(id) {
  PORTAL_REQUESTS = PORTAL_REQUESTS.map(function(r) { return r.id == id ? Object.assign({}, r, { status: 'done' }) : r; });
  SS('gbf_preq', PORTAL_REQUESTS);
  swMoreTab('portalreqs');
  toast('✅ تم تنفيذ الطلب');
}

function deletePortalReq(id) {
  PORTAL_REQUESTS = PORTAL_REQUESTS.filter(function(r) { return r.id != id; });
  SS('gbf_preq', PORTAL_REQUESTS);
  swMoreTab('portalreqs');
}

function sharePortalLink() {
  var url = window.location.origin + window.location.pathname;
  var msg = '🎮 ' + (SETTINGS.shopName || 'المحل') + '\n\nافتح ملفك الشخصي وتابع نقاطك وحجوزاتك:\n' + url + '#portal=اسمك\n\nضع اسمك مكان "اسمك" في الرابط';
  if (navigator.share) { navigator.share({ title: 'بوابة ' + SETTINGS.shopName, text: msg, url: url }); }
  else if (navigator.clipboard) { navigator.clipboard.writeText(msg).then(function() { toast('📋 تم نسخ رابط البوابة'); }); }
}

// ── Patch MORE routing for portal requests ────────────────────────────
(function patchPortalRoute() {
  var origBody = _renderMoreBody;
  _renderMoreBody = function(t) {
    if (t === 'portalreqs') {
      var el = document.getElementById('more-body');
      if (el) el.innerHTML = renderPortalRequestsHTML();
    } else {
      origBody(t);
    }
  };
})();

// Add portal item to MORE_ITEMS
MORE_ITEMS.push({ id: 'portalreqs', icon: '📱', label: 'بوابة العملاء', cat: 'customers', color: '#38bdf8' });

// ── Auto-detect portal URL on load ───────────────────────────────────
setTimeout(function() { checkPortalURL(); }, 200);
window.addEventListener('hashchange', function() { checkPortalURL(); });

</script>
